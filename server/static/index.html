<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════

const state = {
  view: 'dashboard',
  workspaces: [],
  catalog: { agents: {}, templates: {}, tools: {} },
  currentOpp: null,
  // Graph state
  graph: null, // { sim, renderer, nodeMap, animId }
  ws: null,
};

const AGENT_COLORS = {
  product: '#10B981', design: '#8B5CF6', data: '#3B82F6', engineering: '#F97316',
  'commercial-strategy': '#EC4899', analyst: '#14B8A6', research: '#A855F7',
};
function agentColor(fn) { return AGENT_COLORS[fn] || '#6b7a90'; }
function rosterFn(r) { return r.function || r.agent_function; }
function normalizeAssumption(a, i) {
  const mkId = () => `asm-${String(i+1).padStart(3,'0')}`;
  if (typeof a === 'string') {
    // Try parsing Python dict repr strings like "{'text': '...', 'confidence': 'high'}"
    if (a.startsWith('{') && a.includes("'text'")) {
      try {
        const obj = JSON.parse(a.replace(/'/g, '"'));
        if (obj.text) return {id: mkId(), content: obj.text, confidence: obj.confidence, source: obj.source, status: obj.status || 'untested', importance: obj.importance || 'medium'};
      } catch {}
    }
    return {id: mkId(), content: a, status: 'untested', importance: 'medium'};
  }
  if (a && typeof a === 'object') {
    if (a.content) return a;
    if (a.text) return {id: a.id || mkId(), content: a.text, confidence: a.confidence, source: a.source, status: a.status || 'untested', importance: a.importance || 'medium'};
  }
  return {id: mkId(), content: String(a||''), status: 'untested', importance: 'medium'};
}

const TYPE_COLORS = {
  evidence_candidate: '#10B981', counter_signal: '#EF4444', constraint: '#64748B',
  opportunity: '#14B8A6', risk: '#F59E0B', measurement: '#06B6D4',
  prototype_insight: '#A78BFA', strategic_insight: '#10B981', competitive_intel: '#3B82F6',
};
const IMP_COLORS = { critical: '#EF4444', high: '#F59E0B', medium: '#64748B' };

// ════════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════════

const api = {
  async get(path) { const r = await fetch(`/api/${path}`); return r.ok ? r.json() : null; },
  async getText(path) { const r = await fetch(`/api/${path}`); return r.ok ? r.text() : null; },
  async post(path, body) {
    const r = await fetch(`/api/${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.statusText); }
    return r.json();
  },
  async patch(path, body) {
    const r = await fetch(`/api/${path}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.statusText); }
    return r.json();
  },
};

// ════════════════════════════════════════════════════════════
// PHYSICS ENGINE
// ════════════════════════════════════════════════════════════

const PHYSICS = {
  chargeStrength: -150,
  linkDistance: 120,
  linkStrength: 0.15,
  centerGravity: 0.003,
  clusterGravity: 0.014,
  clusterRepulsion: -800,
  damping: 0.15,
  iterations: 3,
  noiseAmp: 0.06,
  noiseSpeed: 0.0004,
};

class GNode {
  constructor(id, type, color, radius, data) {
    this.id = id; this.type = type; this.color = color;
    this.radius = radius; this.data = data || {};
    this.x = 0; this.y = 0; this.px = 0; this.py = 0;
    this.fx = 0; this.fy = 0;
    this.mass = type === 'center' ? 3 : 1;
    this.alive = false; this.spawnTime = 0;
    this.pinned = false; this.glowIntensity = 1;
    this.highlighted = false; this.dimmed = false; this.dimAlpha = 1;
    this.isCounter = false;
    this.cluster = null;
    this.pulsePhase = Math.random() * Math.PI * 2;
  }
  spawn(x, y, vx, vy) {
    this.x = x; this.y = y;
    this.px = x - (vx || 0); this.py = y - (vy || 0);
    this.alive = true; this.spawnTime = performance.now();
  }
  applyForce(fx, fy) { this.fx += fx / this.mass; this.fy += fy / this.mass; }
  integrate(damping) {
    if (this.pinned || !this.alive) return;
    let vx = (this.x - this.px) * (1 - damping);
    let vy = (this.y - this.py) * (1 - damping);
    const speed = Math.sqrt(vx * vx + vy * vy);
    if (speed > 3) { vx = (vx / speed) * 3; vy = (vy / speed) * 3; }
    this.px = this.x; this.py = this.y;
    this.x += vx + this.fx; this.y += vy + this.fy;
    this.fx = 0; this.fy = 0;
  }
}

class GLink {
  constructor(source, target, distance, color, type) {
    this.source = source; this.target = target;
    this.distance = distance; this.color = color;
    this.type = type; this.alive = false;
    this.particle = 0;
    this.particleSpeed = 0.003 + Math.random() * 0.002;
  }
  apply(strength) {
    if (!this.alive || !this.source.alive || !this.target.alive) return;
    const dx = this.target.x - this.source.x;
    const dy = this.target.y - this.source.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const delta = (this.distance - dist) * strength * 0.5;
    const fx = (dx / dist) * delta, fy = (dy / dist) * delta;
    this.source.applyForce(-fx, -fy);
    this.target.applyForce(fx, fy);
  }
}

class ForceSimulation {
  constructor() { this.nodes = []; this.links = []; this.width = 800; this.height = 600; this.time = 0; this._scanStart = null; this._scanDuration = 3000; this.alpha = 1.0; this.alphaDecay = 0.002; this.alphaMin = 0.01; this._lastNodeCount = 0; }
  reheat() { this.alpha = 1.0; }
  tick() {
    const alive = this.nodes.filter(n => n.alive);
    if (!alive.length) return;
    // Reheat when new nodes are added
    if (alive.length !== this._lastNodeCount) { this._lastNodeCount = alive.length; this.reheat(); }
    // Cool down
    this.alpha = Math.max(this.alphaMin, this.alpha * (1 - this.alphaDecay));
    const a = this.alpha;
    for (let iter = 0; iter < PHYSICS.iterations; iter++) {
      for (const link of this.links) link.apply(PHYSICS.linkStrength);
      // Charge repulsion
      for (let i = 0; i < alive.length; i++) {
        for (let j = i + 1; j < alive.length; j++) {
          const a = alive[i], b = alive[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const distSq = dx * dx + dy * dy || 1;
          const dist = Math.sqrt(distSq);
          const force = PHYSICS.chargeStrength / distSq;
          const fx = (dx / dist) * force, fy = (dy / dist) * force;
          a.applyForce(fx, fy); b.applyForce(-fx, -fy);
        }
      }
      // Center gravity
      const cx = this.width / 2, cy = this.height / 2;
      for (const n of alive) {
        n.applyForce((cx - n.x) * PHYSICS.centerGravity * a, (cy - n.y) * PHYSICS.centerGravity * a);
      }
      // Cluster gravity
      const clusters = {};
      for (const n of alive) {
        if (!n.cluster) continue;
        if (!clusters[n.cluster]) clusters[n.cluster] = { sx: 0, sy: 0, count: 0, nodes: [] };
        clusters[n.cluster].sx += n.x; clusters[n.cluster].sy += n.y;
        clusters[n.cluster].count++; clusters[n.cluster].nodes.push(n);
      }
      const clusterIds = Object.keys(clusters);
      for (const cid of clusterIds) {
        const c = clusters[cid];
        c.cx = c.sx / c.count; c.cy = c.sy / c.count;
        for (const n of c.nodes) {
          n.applyForce((c.cx - n.x) * PHYSICS.clusterGravity, (c.cy - n.y) * PHYSICS.clusterGravity);
        }
      }
      // Inter-cluster repulsion
      for (let i = 0; i < clusterIds.length; i++) {
        for (let j = i + 1; j < clusterIds.length; j++) {
          const a = clusters[clusterIds[i]], b = clusters[clusterIds[j]];
          const dx = b.cx - a.cx, dy = b.cy - a.cy;
          const distSq = dx * dx + dy * dy || 1;
          const dist = Math.sqrt(distSq);
          const force = PHYSICS.clusterRepulsion / distSq;
          const fx = (dx / dist) * force, fy = (dy / dist) * force;
          for (const n of a.nodes) n.applyForce(fx / a.count, fy / a.count);
          for (const n of b.nodes) n.applyForce(-fx / b.count, -fy / b.count);
        }
      }
      // Noise (fades as simulation cools)
      this.time += PHYSICS.noiseSpeed;
      const noiseScale = PHYSICS.noiseAmp * a;
      for (const n of alive) {
        if (n.pinned) continue;
        n.applyForce(
          Math.sin(this.time * 1.7 + n.x * 0.01 + n.y * 0.013) * noiseScale,
          Math.cos(this.time * 1.3 + n.y * 0.01 + n.x * 0.011) * noiseScale
        );
      }
      for (const n of alive) n.integrate(PHYSICS.damping);
      // Bounds
      const m = 40;
      for (const n of alive) {
        n.x = Math.max(m, Math.min(this.width - m, n.x));
        n.y = Math.max(m, Math.min(this.height - m, n.y));
      }
    }
    // Animate review particles
    for (const l of this.links) {
      if (l.alive && l.type.startsWith('review')) l.particle = (l.particle + l.particleSpeed) % 1;
    }
  }
}

// ════════════════════════════════════════════════════════════
// RENDERER
// ════════════════════════════════════════════════════════════

class Renderer {
  constructor(canvas, sim) {
    this.canvas = canvas; this.ctx = canvas.getContext('2d');
    this.sim = sim; this.dpr = window.devicePixelRatio || 1;
    this.zoom = 1; this.panX = 0; this.panY = 0;
    this._targetZoom = 1; this._targetPanX = 0; this._targetPanY = 0;
    this._animating = false;
    this.resize();
  }
  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    this.canvas.width = w * this.dpr; this.canvas.height = h * this.dpr;
    this.canvas.style.width = w + 'px'; this.canvas.style.height = h + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.sim.width = w; this.sim.height = h;
  }
  screenToGraph(sx, sy) {
    const rect = this.canvas.getBoundingClientRect();
    const lx = sx - rect.left, ly = sy - rect.top;
    const w = this.sim.width, h = this.sim.height;
    return {
      x: (lx - w / 2 - this.panX) / this.zoom + w / 2,
      y: (ly - h / 2 - this.panY) / this.zoom + h / 2
    };
  }
  animateTo(zoom, panX, panY) {
    this._targetZoom = zoom; this._targetPanX = panX; this._targetPanY = panY;
    this._animating = true;
  }
  _updateAnimation() {
    if (!this._animating) return;
    const ease = 0.1;
    this.zoom += (this._targetZoom - this.zoom) * ease;
    this.panX += (this._targetPanX - this.panX) * ease;
    this.panY += (this._targetPanY - this.panY) * ease;
    if (Math.abs(this.zoom - this._targetZoom) < 0.001 &&
        Math.abs(this.panX - this._targetPanX) < 0.5 &&
        Math.abs(this.panY - this._targetPanY) < 0.5) {
      this.zoom = this._targetZoom; this.panX = this._targetPanX; this.panY = this._targetPanY;
      this._animating = false;
    }
  }
  render(time) {
    this._updateAnimation();
    const { ctx, sim, zoom, panX, panY } = this;
    const w = sim.width, h = sim.height;
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    // Background gradient
    const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.6);
    bgGrad.addColorStop(0, '#0e1018'); bgGrad.addColorStop(1, '#0a0c12');
    ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, w, h);
    // Apply zoom/pan
    ctx.setTransform(this.dpr * zoom, 0, 0, this.dpr * zoom,
      this.dpr * (w / 2 + panX - (w / 2) * zoom),
      this.dpr * (h / 2 + panY - (h / 2) * zoom));
    // Draw links
    for (const l of sim.links) { if (l.alive && l.source.alive && l.target.alive) this.drawLink(l, time); }
    // Draw nodes
    for (const n of sim.nodes) { if (n.alive) this.drawNode(n, time); }
    // Scan ring effect
    if (sim._scanStart) {
      const elapsed = time - sim._scanStart;
      const progress = elapsed / sim._scanDuration;
      if (progress > 1.3) { sim._scanStart = null; }
      else {
        const cx = w / 2, cy = h / 2;
        const maxR = Math.max(w, h) * 0.5;
        const ringR = progress * maxR;
        const ringAlpha = Math.max(0, 1 - progress * 0.8);
        ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(16, 185, 129, ${ringAlpha * 0.4})`;
        ctx.lineWidth = 2; ctx.stroke();
        ctx.save(); ctx.filter = 'blur(8px)';
        ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(16, 185, 129, ${ringAlpha * 0.2})`;
        ctx.lineWidth = 12; ctx.stroke();
        ctx.restore();
        for (const n of sim.nodes) {
          if (!n.alive) continue;
          const dist = Math.sqrt((n.x - cx) ** 2 + (n.y - cy) ** 2);
          const diff = Math.abs(dist - ringR);
          if (diff < 30) {
            const pulse = 1 - diff / 30;
            const gr = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius * 4);
            gr.addColorStop(0, `rgba(16, 185, 129, ${pulse * 0.3})`);
            gr.addColorStop(1, 'transparent');
            ctx.fillStyle = gr;
            ctx.beginPath(); ctx.arc(n.x, n.y, n.radius * 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  drawLink(link, time) {
    const { ctx } = this;
    const s = link.source, t = link.target;
    const dx = t.x - s.x, dy = t.y - s.y, dist = Math.sqrt(dx*dx + dy*dy);
    const isBrief = link.type === 'brief' || link.type === 'brief-ref';
    const baseAlpha = 0.06;
    const maxAlpha = link.type.startsWith('review') ? 0.45 : isBrief ? 0.5 : 0.2;
    const prox = Math.max(baseAlpha, maxAlpha * (1 - Math.min(dist / 300, 1)));
    const dimFactor = Math.min(s.dimAlpha ?? 1, t.dimAlpha ?? 1);
    const alpha = prox * dimFactor;
    ctx.beginPath(); ctx.moveTo(s.x, s.y);
    if (link.type.startsWith('review')) {
      const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
      const px = -(t.y-s.y)*0.15, py = (t.x-s.x)*0.15;
      ctx.quadraticCurveTo(mx+px, my+py, t.x, t.y);
    } else { ctx.lineTo(t.x, t.y); }
    ctx.strokeStyle = link.color || '#4a5568';
    ctx.globalAlpha = alpha;
    ctx.lineWidth = link.type.startsWith('review') ? 1.5 : isBrief ? 1.8 : 0.7;
    if (link.type === 'review-challenge') ctx.setLineDash([4, 3]);
    else if (isBrief) ctx.setLineDash([6, 4]);
    else ctx.setLineDash([]);
    ctx.stroke(); ctx.globalAlpha = 1; ctx.setLineDash([]);
    // Glow for brief links
    if (isBrief && alpha > 0.1) {
      ctx.save(); ctx.filter = 'blur(4px)'; ctx.globalAlpha = alpha * 0.3;
      ctx.strokeStyle = '#F59E0B'; ctx.lineWidth = 3; ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
      ctx.stroke(); ctx.restore(); ctx.setLineDash([]);
    }
    // Glow for review links
    if (link.type.startsWith('review') && alpha > 0.12) {
      ctx.save(); ctx.filter = 'blur(3px)'; ctx.globalAlpha = alpha * 0.35;
      ctx.strokeStyle = link.color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(s.x, s.y);
      const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
      const px = -(t.y-s.y)*0.15, py = (t.x-s.x)*0.15;
      ctx.quadraticCurveTo(mx+px, my+py, t.x, t.y);
      ctx.stroke(); ctx.restore();
    }
    // Particle on review links
    if (link.type.startsWith('review') && alpha > 0.08) {
      const p = link.particle;
      const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
      const ppx = -(t.y-s.y)*0.15, ppy = (t.x-s.x)*0.15;
      const cpx = mx+ppx, cpy = my+ppy;
      const qx = (1-p)*(1-p)*s.x + 2*(1-p)*p*cpx + p*p*t.x;
      const qy = (1-p)*(1-p)*s.y + 2*(1-p)*p*cpy + p*p*t.y;
      const pCol = link.type === 'review-challenge' ? '#EF4444' : '#10B981';
      const grad = ctx.createRadialGradient(qx, qy, 0, qx, qy, 5);
      grad.addColorStop(0, pCol); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad; ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(qx, qy, 5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  drawNode(node, time) {
    const { ctx } = this;
    const age = (time - node.spawnTime) / 1000;
    const t = Math.min(1, age * 0.9);
    const spawnScale = 1 - (1 - t) * (1 - t);
    const r = node.radius * spawnScale;
    if (r < 0.5) return;
    const dimTarget = node.dimmed ? 0.25 : 1;
    node.dimAlpha += (dimTarget - node.dimAlpha) * 0.04;
    const alpha = node.dimAlpha;
    const gm = node.highlighted ? 1.8 : 1;
    // Glow halo
    const glowR = r * 3 * gm;
    const gg = ctx.createRadialGradient(node.x, node.y, r * 0.3, node.x, node.y, glowR);
    gg.addColorStop(0, this.ca(node.color, 0.22 * alpha * gm));
    gg.addColorStop(0.5, this.ca(node.color, 0.06 * alpha * gm));
    gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(node.x, node.y, glowR, 0, Math.PI*2); ctx.fill();
    // Counter pulse
    if (node.isCounter) {
      const p = 0.5 + 0.5 * Math.sin(time * 0.003 + node.pulsePhase);
      const pr = r * (2.5 + p * 1.5);
      const pg = ctx.createRadialGradient(node.x, node.y, r, node.x, node.y, pr);
      pg.addColorStop(0, this.ca('#EF4444', 0.12 * p * alpha)); pg.addColorStop(1, 'transparent');
      ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(node.x, node.y, pr, 0, Math.PI*2); ctx.fill();
    }
    // Center pulse
    if (node.type === 'center') {
      const p = 0.5 + 0.5 * Math.sin(time * 0.002);
      const pr = r * (2 + p);
      const pg = ctx.createRadialGradient(node.x, node.y, r, node.x, node.y, pr);
      pg.addColorStop(0, this.ca('#10B981', 0.1 * p * alpha)); pg.addColorStop(1, 'transparent');
      ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(node.x, node.y, pr, 0, Math.PI*2); ctx.fill();
    }
    // Brief glow
    if (node.type === 'brief') {
      const p = 0.5 + 0.5 * Math.sin(time * 0.003);
      const pr = r * (2.2 + p * 0.8);
      const pg = ctx.createRadialGradient(node.x, node.y, r, node.x, node.y, pr);
      pg.addColorStop(0, this.ca('#F59E0B', 0.15 * p * alpha)); pg.addColorStop(1, 'transparent');
      ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(node.x, node.y, pr, 0, Math.PI*2); ctx.fill();
    }
    // Shape
    if (node.type === 'brief') {
      ctx.globalAlpha = alpha; ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const hx = node.x + Math.cos(a) * r, hy = node.y + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fillStyle = this.ca('#F59E0B', 0.35); ctx.fill();
      ctx.strokeStyle = '#F59E0B'; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.arc(node.x, node.y, r * 0.3, 0, Math.PI*2);
      ctx.fillStyle = this.ca('#F59E0B', 0.7); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (node.type === 'artifact') {
      ctx.save(); ctx.translate(node.x, node.y); ctx.rotate(Math.PI/4);
      ctx.globalAlpha = alpha; ctx.fillStyle = this.ca(node.color, 0.45);
      ctx.fillRect(-r*0.7, -r*0.7, r*1.4, r*1.4);
      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
      ctx.strokeRect(-r*0.7, -r*0.7, r*1.4, r*1.4);
      ctx.globalAlpha = 1; ctx.restore();
    } else if (node.type === 'assumption') {
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, Math.PI*2);
      ctx.strokeStyle = node.color; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.arc(node.x, node.y, r*0.3, 0, Math.PI*2);
      ctx.fillStyle = this.ca(node.color, 0.4); ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, Math.PI*2);
      ctx.fillStyle = this.ca(node.color, 0.4); ctx.fill();
      ctx.strokeStyle = node.data?.typeColor || node.color;
      ctx.lineWidth = node.type === 'center' ? 2.5 : 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(node.x, node.y, r*0.35, 0, Math.PI*2);
      ctx.fillStyle = this.ca(node.color, 0.7); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Labels
    ctx.textAlign = 'center';
    const labelY = node.y + r + 13;
    if (node.type === 'center') {
      ctx.globalAlpha = alpha * 0.7; ctx.fillStyle = '#10B981';
      ctx.font = 'bold 10px Inter, system-ui';
      ctx.fillText('OPPORTUNITY', node.x, labelY);
    } else if (node.type === 'assumption') {
      ctx.globalAlpha = alpha * 0.5; ctx.fillStyle = node.color;
      ctx.font = '8px JetBrains Mono, monospace';
      const imp = node.data?.importance || '';
      const tag = imp === 'critical' ? 'CRITICAL' : imp === 'high' ? 'HIGH' : 'MED';
      ctx.fillText(`${node.id} [${tag}]`, node.x, labelY);
    } else if (node.type === 'finding') {
      const d = node.data;
      const LABELS = { counter_signal: 'COUNTER', risk: 'RISK', opportunity: 'OPPORTUNITY',
        evidence_candidate: 'EVIDENCE', prototype_insight: 'PROTOTYPE', measurement: 'MEASUREMENT',
        constraint: 'CONSTRAINT', strategic_insight: 'STRATEGY', competitive_intel: 'INTEL' };
      const label = LABELS[d.type] || d.type?.replace(/_/g,' ').toUpperCase() || 'FINDING';
      if (node.isCounter) {
        ctx.globalAlpha = alpha * 0.85; ctx.fillStyle = '#EF4444';
        ctx.font = 'bold 9px JetBrains Mono, monospace';
      } else if (d.confidence >= 0.8) {
        ctx.globalAlpha = alpha * 0.7; ctx.fillStyle = node.color;
        ctx.font = 'bold 8px JetBrains Mono, monospace';
      } else {
        ctx.globalAlpha = alpha * 0.35; ctx.fillStyle = '#6b7a90';
        ctx.font = '8px JetBrains Mono, monospace';
      }
      ctx.fillText(label, node.x, labelY);
    } else if (node.type === 'brief') {
      ctx.globalAlpha = alpha * 0.85; ctx.fillStyle = '#F59E0B';
      ctx.font = 'bold 9px Inter, system-ui';
      ctx.fillText(node.data?.agent_function?.toUpperCase() || 'BRIEF', node.x, labelY);
    } else if (node.type === 'artifact') {
      ctx.globalAlpha = alpha * 0.35; ctx.fillStyle = '#6b7a90';
      ctx.font = '7px JetBrains Mono, monospace';
      ctx.fillText('ARTIFACT', node.x, labelY);
    }
    ctx.globalAlpha = 1;
  }
  ca(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
}

// ════════════════════════════════════════════════════════════
// GRAPH BUILDER — from API data
// ════════════════════════════════════════════════════════════

async function buildGraphFromWorkspace(opp_id) {
  const ws = await api.get(`workspaces/${opp_id}`);
  if (!ws) return null;
  const opp = ws.opportunity;

  const sim = new ForceSimulation();
  const nodeMap = {};

  // Center node (opportunity)
  const center = new GNode('center', 'center', '#10B981', 18, opp);
  nodeMap['center'] = center; sim.nodes.push(center);

  // Assumptions
  (opp.assumptions || []).map(normalizeAssumption).forEach(asm => {
    const node = new GNode(asm.id, 'assumption', IMP_COLORS[asm.importance] || '#64748B', 8, asm);
    node.cluster = 'assumptions';
    nodeMap[asm.id] = node; sim.nodes.push(node);
    sim.links.push(new GLink(center, node, 90, '#2a2d37', 'assumption'));
  });

  // Load contributions and build finding nodes
  const briefNodes = {};
  for (const c of ws.contributions) {
    const data = await api.get(`workspaces/${opp_id}/contributions/${c.filename}`);
    if (!data) continue;
    const fn = data.agent_function || c.filename.replace('.json', '').replace(/-round-\d+/, '');
    const color = agentColor(fn);

    // Brief node per contribution
    const briefId = `brief:${c.filename}`;
    const briefNode = new GNode(briefId, 'brief', '#F59E0B', 14, {
      ...data, agent_function: fn, filename: c.filename
    });
    briefNode.cluster = fn;
    nodeMap[briefId] = briefNode; sim.nodes.push(briefNode);
    briefNodes[fn] = briefNode;
    sim.links.push(new GLink(center, briefNode, 60, '#F59E0B', 'brief'));

    // Finding nodes
    (data.findings || []).forEach((f, fi) => {
      const key = `${fn}:${f.id || 'f' + fi}`;
      const r = f.confidence > 0.8 ? 10 : (f.confidence > 0.6 ? 8 : 6);
      const node = new GNode(key, 'finding', color, r, {
        ...f, agent: fn, agentLabel: fn, typeColor: TYPE_COLORS[f.type] || '#64748B'
      });
      node.isCounter = f.type === 'counter_signal' || f.direction === 'contradicts';
      node.cluster = fn;
      nodeMap[key] = node; sim.nodes.push(node);

      // Link to assumptions
      const asmLinks = f.assumptions || f.assumption_refs || [];
      let linked = false;
      asmLinks.forEach(asmId => {
        if (nodeMap[asmId]) {
          sim.links.push(new GLink(node, nodeMap[asmId], 130, color, 'assumption'));
          linked = true;
        }
      });
      // Fallback: link to brief
      if (!linked) {
        sim.links.push(new GLink(node, briefNode, 100, color, 'finding'));
      }
    });
  }

  // Load reviews and create review links
  for (const r of ws.reviews) {
    const data = await api.get(`workspaces/${opp_id}/reviews/${r.filename}`);
    if (!data) continue;
    const reviewer = data.reviewer || r.filename.split('-reviews-')[0]?.replace('.json', '') || '';
    const reviewed = data.reviewed || r.filename.split('-reviews-')[1]?.replace('.json', '') || '';
    const reviewerColor = agentColor(reviewer);

    (data.reviews || data.items || []).forEach(item => {
      const targetKey = `${reviewed}:${item.finding_id || item.findingId || ''}`;
      const target = nodeMap[targetKey];
      if (!target) return;
      // Find a source node from the reviewer
      const srcKeys = Object.keys(nodeMap).filter(k => k.startsWith(reviewer + ':'));
      const src = nodeMap[srcKeys[Math.floor(Math.random() * srcKeys.length)]];
      if (!src) return;
      const isChal = ['challenge','concern','contradicts','disagree'].includes(item.assessment || item.verdict);
      sim.links.push(new GLink(src, target, 180, reviewerColor, isChal ? 'review-challenge' : 'review-agree'));
    });
  }

  // Artifact nodes
  for (const a of ws.artifacts) {
    const fn = a.filename.split('-')[0] || 'unknown';
    const color = agentColor(fn);
    const artNode = new GNode(`artifact:${a.filename}`, 'artifact', color, 7, {
      ...a, agent: fn
    });
    artNode.cluster = fn;
    nodeMap[`artifact:${a.filename}`] = artNode; sim.nodes.push(artNode);
    const parentBrief = briefNodes[fn];
    if (parentBrief) {
      sim.links.push(new GLink(artNode, parentBrief, 70, color, 'assumption'));
    } else {
      sim.links.push(new GLink(artNode, center, 120, color, 'assumption'));
    }
  }

  return { sim, nodeMap, ws };
}

// ════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════

function setupInteractions(canvas, sim, nodeMap, renderer) {
  let hoveredNode = null, dragNode = null, isPanning = false, panStartX = 0, panStartY = 0;

  function findNodeAt(sx, sy) {
    const { x: gx, y: gy } = renderer.screenToGraph(sx, sy);
    let closest = null, closestDist = Infinity;
    for (const n of sim.nodes) {
      if (!n.alive) continue;
      const d = Math.sqrt((n.x - gx) ** 2 + (n.y - gy) ** 2);
      const hitR = (n.radius + 10) / renderer.zoom;
      if (d < hitR && d < closestDist) { closest = n; closestDist = d; }
    }
    return closest;
  }

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomFactor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
    const newZoom = Math.min(4, Math.max(0.2, renderer.zoom * zoomFactor));
    const rect = canvas.getBoundingClientRect();
    const w = sim.width, h = sim.height;
    const mx = (e.clientX - rect.left) - w / 2, my = (e.clientY - rect.top) - h / 2;
    const scale = newZoom / renderer.zoom;
    renderer.panX = mx - scale * (mx - renderer.panX);
    renderer.panY = my - scale * (my - renderer.panY);
    renderer.zoom = newZoom;
    renderer._targetZoom = newZoom; renderer._targetPanX = renderer.panX; renderer._targetPanY = renderer.panY;
    renderer._animating = false;
  }, { passive: false });

  canvas.addEventListener('mousemove', e => {
    if (isPanning) {
      renderer.panX += e.movementX; renderer.panY += e.movementY;
      renderer._targetPanX = renderer.panX; renderer._targetPanY = renderer.panY;
      return;
    }
    if (dragNode) {
      const { x: gx, y: gy } = renderer.screenToGraph(e.clientX, e.clientY);
      dragNode.x = gx; dragNode.y = gy; dragNode.px = gx; dragNode.py = gy;
      return;
    }
    const node = findNodeAt(e.clientX, e.clientY);
    if (node !== hoveredNode) {
      sim.nodes.forEach(n => n.highlighted = false);
      hideTooltip();
      hoveredNode = node;
      if (node) {
        canvas.style.cursor = 'pointer'; node.highlighted = true;
        let text = node.id;
        if (node.type === 'finding') text = `${node.data.agent}: ${(node.data.summary || node.data.content || '').substring(0, 80)}...`;
        else if (node.type === 'assumption') text = `${node.id} [${node.data.importance}] ${(node.data.content || '').substring(0, 60)}`;
        else if (node.type === 'center') text = 'Opportunity';
        else if (node.type === 'brief') text = `${node.data.agent_function} contribution`;
        else if (node.type === 'artifact') text = node.data.filename || 'Artifact';
        showTooltip(e.clientX, e.clientY, text);
      } else { canvas.style.cursor = 'default'; }
    }
  });

  canvas.addEventListener('mousedown', e => {
    const node = findNodeAt(e.clientX, e.clientY);
    if (node) { dragNode = node; dragNode.pinned = true; }
    else { isPanning = true; canvas.style.cursor = 'grab'; }
  });

  canvas.addEventListener('mouseup', () => {
    if (dragNode && dragNode.type !== 'center') dragNode.pinned = false;
    dragNode = null; isPanning = false; canvas.style.cursor = 'default';
  });

  canvas.addEventListener('click', e => {
    if (isPanning) return;
    const node = findNodeAt(e.clientX, e.clientY);
    if (!node) { closeDrawer(); return; }
    showNodeDetail(node);
  });
}

function showTooltip(x, y, text) {
  hideTooltip();
  const tip = document.createElement('div'); tip.id = 'tooltip';
  tip.style.left = (x + 14) + 'px'; tip.style.top = (y - 10) + 'px';
  tip.textContent = text; document.body.appendChild(tip);
}
function hideTooltip() { const t = document.getElementById('tooltip'); if (t) t.remove(); }

function openDrawer() { const el = document.getElementById('detail-drawer'); if (el) el.classList.add('open'); }
function closeDrawer() { const el = document.getElementById('detail-drawer'); if (el) el.classList.remove('open'); }

    el.innerHTML = `

      </div>
      <div class="text-primary mb-12 word-break">${formatContent(f.summary || f.content || '')}</div>
      <div class="flex gap-20 text-base text-secondary">
        <div><span>Confidence</span>
          <div class="confidence-bar" style="width:100px"><div class="confidence-fill" style="width:${(f.confidence||0)*100}%;background:${agentColor(f.agent)}"></div></div>
          <span>${f.confidence || '?'}</span></div>
      </div>
      ${f.source ? `<div class="finding-source drawer-meta">${esc(f.source)}</div>` : ''}`;
  } else if (node.type === 'assumption') {
    const asm = node.data;
    const ic = IMP_COLORS[asm.importance] || '#64748B';
    el.innerHTML = `
      <div class="flex items-center gap-12 mb-12">
        <code class="font-semibold text-lg">${asm.id || node.id}</code>
        <span class="drawer-badge" style="background:${ic}20;color:${ic}">${asm.importance || 'medium'}</span>
        <span class="drawer-badge">${asm.status || 'untested'}</span>
      </div>
      <div class="text-primary word-break">${formatContent(asm.content || '')}</div>`;
  } else if (node.type === 'brief') {
    const d = node.data;
    el.innerHTML = `
      <div class="flex items-center gap-12 mb-12">
        <span style="width:12px;height:12px;background:#F59E0B;display:inline-block;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)"></span>
        <span class="font-semibold text-brief">${d.agent_function || 'Agent'} Contribution</span>
        <code>${d.filename || ''}</code>
      </div>
      <p class="text-secondary">${'Round ' + (d.round || '?') + ' -- ' + (d.findings || []).length + ' findings'}</p>
      <button class="btn-primary btn--sm mt-12" onclick="toggleContribution('${state.currentOpp?.id}','${d.filename}')">Open Contribution</button>`;
  } else if (node.type === 'artifact') {
    const fn = node.data.filename || '';
    el.innerHTML = `
      <div class="flex items-center gap-12 mb-12">
        <span style="width:12px;height:12px;transform:rotate(45deg);background:${node.color};display:inline-block"></span>
        <span class="font-semibold" style="color:${node.color}">Artifact</span>
      </div>
      <code class="text-secondary">${fn}</code>
      <button class="btn-primary btn--sm mt-12" onclick="toggleArtifact('${state.currentOpp?.id}','${fn}')">Open Artifact</button>`;
  } else if (node.type === 'center') {
    const opp = node.data;
    el.innerHTML = `
      <div class="flex items-center gap-12 mb-12">
        <span class="drawer-dot dot-xl bg-accent"></span>
        <span class="font-semibold text-accent">Opportunity</span>
      </div>
      <h3 class="opp-title-preview mb-8">${esc(opp.title || '')}</h3>
      <p class="text-secondary">${esc(opp.description || '')}</p>`;
  }
  openDrawer();
}

function updateNav(view, params) {
  const back = document.getElementById('nav-back');
  const ctx = document.getElementById('nav-context');
  const wsBadge = document.getElementById('nav-ws');
  if (!back || !ctx) return;
  const hasContext = (view === 'workspace' || view === 'orb') && params?.opp_id;
  if (view === 'settings') {
    back.style.display = '';
    ctx.style.display = '';
    ctx.textContent = 'Settings';
  } else if (hasContext) {
    back.style.display = '';
    ctx.style.display = '';
    const ws = (state.workspaces || []).find(w => w.id === params.opp_id);
    ctx.textContent = ws ? ws.title : params.opp_id;
  } else {
    back.style.display = 'none';
    ctx.style.display = 'none';
  }
  // Only show WS badge on views that use WebSocket
  if (wsBadge) wsBadge.style.display = hasContext ? '' : 'none';
}

async function navigate(view, params) {
  // Cleanup graph on navigation
  if (state.graph) {
    cancelAnimationFrame(state.graph.animId);
    state.graph = null;
  }
  if (state.ws) { state.ws.close(); state.ws = null; }
  if (state._setupWs) { state._setupWs.close(); state._setupWs = null; }
  if (state._setupPoll) { clearInterval(state._setupPoll); state._setupPoll = null; }
  if (state._agentPoll) { clearInterval(state._agentPoll); state._agentPoll = null; }
  if (state._activityTick) { clearInterval(state._activityTick); state._activityTick = null; }
  if (state._processPoll) { clearInterval(state._processPoll); state._processPoll = null; }
  ['_editAssumptions','_editSuccessSignals','_editKillSignals','_editContextRefs','_editRoster'].forEach(k => delete state[k]);
  closeDrawer();
  // Reset WS badge
  const wsBadge = document.getElementById('ws-status');
  if (wsBadge) wsBadge.innerHTML = '<span class="status-dot" style="background:var(--text-muted)"></span> offline <span class="ws-chevron">▾</span>';

  state.view = view;
  updateNav(view, params);

  // Update hash without re-triggering hashchange
  const newHash = view === 'orb' && params?.opp_id
    ? `#orb/${params.opp_id}`
    : view === 'orb'
      ? `#orb/new`
    : view === 'settings'
      ? '#settings'
      : '#';
  if (location.hash !== newHash) {
    history.replaceState(null, '', newHash);
  }

  const main = document.getElementById('main');
  main.scrollTop = 0;

  switch (view) {
    case 'dashboard': main.style.padding = '96px 24px 24px 24px'; main.style.overflow = 'auto'; await renderDashboard(main); break;
    case 'orb': main.style.padding = '0'; main.style.overflow = 'hidden'; await renderOrb(main, params); break;
    case 'settings': main.style.padding = '96px 24px 24px 24px'; main.style.overflow = 'auto'; await renderSettings(main); break;
    default: main.innerHTML = '<div class="empty-state"><div class="empty-text">Unknown view</div></div>';
  }
}

async function renderDashboard(el) {
  state.workspaces = await api.get('workspaces') || [];

  if (state.workspaces.length === 0) {
    el.innerHTML = `
      <div class="section">
        <div class="empty-state">
          <div class="empty-icon">&#9678;</div>
          <div class="empty-text">No orbs yet</div>

          <button class="btn-primary mb-16 mt-16" onclick="navigate('orb')">Launch your first orb</button>
        </div>
        <div id="running-processes"></div>
      </div>`;
    renderProcesses();
    if (state._processPoll) clearInterval(state._processPoll);
    state._processPoll = setInterval(renderProcesses, 3000);
    return;
  }

  el.innerHTML = `
    <div class="section-wide">
      <div class="flex items-center justify-between mb-24">
        <div>
          <div class="label">Workspaces</div>
          <div class="heading">${state.workspaces.length} Orb${state.workspaces.length !== 1 ? 's' : ''}</div>
        </div>
        <button class="btn-primary" onclick="navigate('orb')">+ New Orb</button>
      </div>
      <div class="workspace-grid" id="ws-grid"></div>
    </div>
    <div class="section-wide">
      <div id="running-processes"></div>
    </div>`;

  const grid = document.getElementById('ws-grid');
  state.workspaces.forEach(ws => {
    const statusClass = 'status-' + (ws.status || 'unknown');
    const card = document.createElement('div');
    card.className = 'card card-clickable workspace-card';
    card.onclick = () => navigate('orb', { opp_id: ws.id });
    card.style.position = 'relative';
    card.innerHTML = `
      <button class="ws-delete-btn" onclick="event.stopPropagation();deleteWorkspace('${ws.id}','${esc(ws.title).replace(/'/g,"\\'")}')" title="Delete workspace">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
      <div class="ws-meta">
        <span class="ws-type">${ws.type || 'hypothesis'}</span>
        <span class="status-pill ${statusClass}">${ws.status || 'unknown'}</span>
      </div>
      <div class="ws-title">${esc(ws.title)}</div>
      ${ws.description ? `<div class="ws-desc">${esc(ws.description)}</div>` : ''}
      <div class="ws-footer">
        ${ws.roster_count ? `<span class="ws-agents">${ws.roster_count} agent${ws.roster_count !== 1 ? 's' : ''}</span>` : ''}
        ${ws.updated_at ? `<span class="ws-time">${timeAgo(ws.updated_at)}</span>` : ''}
      </div>`;
    grid.appendChild(card);
  });

  renderProcesses();
  if (state._processPoll) clearInterval(state._processPoll);
  state._processPoll = setInterval(renderProcesses, 3000);
}

async function renderProcesses() {
  const container = document.getElementById('running-processes');
  if (!container) return;
  const data = await api.get('launch/processes');
  const procs = (data?.processes || []).filter(p => p.running);
  if (procs.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = `
    <div class="mb-24">
      <div class="flex items-center gap-8 mb-12">
        <div class="label" style="margin:0">Active Processes</div>
        <span class="status-pill status-running">${procs.length} running</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${procs.map(p => {
          const label = p.function
            ? `<span class="font-mono text-sm">${esc(p.opp_id)}</span><span class="text-xs" style="color:var(--text-secondary)">${esc(p.function)}</span>`
            : `<span class="font-mono text-sm">${esc(p.key)}</span>`;
          return `<div class="card" style="padding:8px 14px;display:flex;align-items:center;gap:12px;">
            <span class="status-pill status-running">running</span>
            ${label}
            <button class="btn-secondary btn--sm" style="margin-left:auto;" onclick="killProcess('${esc(p.key)}')">Kill</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

async function killProcess(key) {
  await api.post('launch/processes/stop', { key });
  renderProcesses();
}

async function deleteWorkspace(id, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  const resp = await fetch(`/api/workspaces/${id}`, { method: 'DELETE' });
  if (resp.ok) navigate('dashboard');
}

// PROGRESSIVE ORB (unified split layout)
// ══════════════════════════════════════════════════════════

function detectPhase(opp) {
  if (!opp) return 'agree';
  const PHASE_MAP = {
    // Canonical statuses
    aligning: 'agree',
    framed: 'assemble',
    assembled: 'assemble',
    orbiting: 'investigate',
    scoring: 'investigate',
    decided: 'investigate',
    // Legacy aliases (backward compat with old workspace data)
    refining: 'agree',
    agreed: 'assemble',
    confirmed: 'assemble',
    assembling: 'assemble',
    converging: 'investigate',
    presented: 'investigate',
    landed: 'investigate',
  };
  const phase = PHASE_MAP[opp.status];
  if (phase) return phase;
  // Fallback: roster presence implies assemble
  if (opp.roster && opp.roster.length > 0) return 'assemble';
  return 'agree';
}

async function renderOrb(el, params) {
  const opp_id = params?.opp_id || null;

  // Reset state
  state.setupOppId = opp_id;
  state._setupState = opp_id ? 'waiting' : 'idle';
  state._setupFeedLen = 0;
  state._setupOutputLen = 0;
  state._loadedContext = [];
  state._setupPlanContent = '';
  state._setupHasPlan = false;
  state._agentCost = 0;
  state._agentTurns = 0;
  state._agentDuration = 0;
  state._agentStartTime = 0;
  state._totalTokens = 0;
  state._editMode = false;
  stopEvidencePolling();

  // Load opportunity if editing existing
  let opp = {};
  if (opp_id) {
    try {
      const ws = await api.get(`workspaces/${opp_id}`);
      opp = ws?.opportunity || {};
      state.currentOpp = opp;
    } catch (err) { console.warn('Failed to load opportunity:', err); }
  }

  // Determine if this is an edit of an existing opportunity
  if (opp_id && opp.title) {
    state._editMode = true;
  }

  const phase = opp_id ? detectPhase(opp) : 'agree';
  state.orbPhase = phase;

  el.innerHTML = `
    <div class="orb-split" data-phase="${phase}">
      <div class="orb-left" id="inv-left"></div>
      <div class="orb-right" id="inv-right"></div>
    </div>`;

  await renderLeftPanel(phase, opp_id, opp);
  renderRightPanel(phase, opp_id, opp);

  // Restore chat history from prior turns and start polling if running
  if (opp_id && (phase === 'agree' || phase === 'assemble')) {
    try {
      const s = await api.get(`launch/${opp_id}/status?full=true`);
      if (s.output?.length) {
        // Render full conversation history
        updateSetupFeed(s.output);
      }
      if (s.running) {
        // Agent is active — poll for new output (full=true stream, dedup via _setupFeedLen)
        state._setupState = 'running';
        pollSetupAgent(opp_id);
      }
    } catch (err) { console.warn('Failed to restore chat history:', err); }
  }

  if (opp_id && phase !== 'investigate') {
    // In investigate phase, renderGraphPanel connects its own WebSocket
    connectOrbWS(opp_id);
  }
}

async function renderLeftPanel(phase, opp_id, opp) {
  const el = document.getElementById('inv-left');
  if (!el) return;
  if (phase === 'agree' || phase === 'assemble') {
    renderChatPanel(el, opp_id, opp);
  } else {
    await renderGraphPanel(el, opp_id, opp);
  }
}

function renderRightPanel(phase, opp_id, opp) {
  const el = document.getElementById('inv-right');
  if (!el) return;
  switch (phase) {
    case 'agree': renderAgreeCards(el, opp_id, opp); break;
    case 'assemble': renderAssembleCards(el, opp_id, opp); break;
    case 'investigate': renderOrbSidebar(el, opp_id, opp); break;
  }
}

async function renderGraphPanel(el, opp_id, opp) {
  el.innerHTML = `
    <div class="graph-panel" id="graph-panel" style="position:relative;width:100%;height:100%">
      <canvas id="orbital-canvas"></canvas>
      <div class="graph-stats" id="graph-stats"></div>
      <div class="agent-legend" id="agent-legend"></div>
      <div class="graph-controls">
        <button id="zoom-in-btn" title="Zoom in">+</button>
        <button id="recenter-btn" title="Recenter">&#8982;</button>
        <button id="zoom-out-btn" title="Zoom out">&minus;</button>
      </div>
    </div>`;

  const result = await buildGraphFromWorkspace(opp_id);
  if (!result) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--color-muted)">Workspace not found</div>';
    return;
  }

  const { sim, nodeMap, ws } = result;
  state.currentOpp = ws.opportunity;

  // Spawn all nodes
  const cx = sim.width / 2, cy = sim.height / 2;
  const AGENT_ANGLES = { product: Math.PI / 4, design: 3 * Math.PI / 4, data: 5 * Math.PI / 4, engineering: 7 * Math.PI / 4 };
  const agentKeys = [...new Set(sim.nodes.filter(n => n.cluster && n.cluster !== 'assumptions').map(n => n.cluster))];

  for (const n of sim.nodes) {
    if (n.type === 'center') {
      n.spawn(cx, cy, 0, 0); n.pinned = true;
    } else if (n.type === 'assumption') {
      const asmNodes = sim.nodes.filter(nn => nn.type === 'assumption');
      const i = asmNodes.indexOf(n);
      const angle = (i / Math.max(asmNodes.length, 1)) * Math.PI * 2 - Math.PI / 2;
      n.spawn(cx + Math.cos(angle) * 100, cy + Math.sin(angle) * 100, Math.cos(angle) * 0.3, Math.sin(angle) * 0.3);
    } else if (n.cluster) {
      const ai = agentKeys.indexOf(n.cluster);
      const homeAngle = AGENT_ANGLES[n.cluster] || (ai / Math.max(agentKeys.length, 1)) * Math.PI * 2;
      const offset = n.type === 'brief' ? 70 : 120 + Math.random() * 60;
      n.spawn(
        cx + Math.cos(homeAngle) * offset + (Math.random() - 0.5) * 40,
        cy + Math.sin(homeAngle) * offset + (Math.random() - 0.5) * 40,
        Math.cos(homeAngle) * 0.2, Math.sin(homeAngle) * 0.2
      );
    } else {
      n.spawn(cx + (Math.random() - 0.5) * 200, cy + (Math.random() - 0.5) * 200, 0, 0);
    }
  }
  sim.links.forEach(l => { if (l.source.alive && l.target.alive) l.alive = true; });

  updateGraphStats(sim, agentKeys);
  renderAgentLegend(agentKeys);

  const canvas = document.getElementById('orbital-canvas');
  const renderer = new Renderer(canvas, sim);
  setupInteractions(canvas, sim, nodeMap, renderer);

  const recenterBtn = document.getElementById('recenter-btn');
  const zoomInBtn = document.getElementById('zoom-in-btn');
  const zoomOutBtn = document.getElementById('zoom-out-btn');
  if (recenterBtn) recenterBtn.onclick = () => renderer.animateTo(1, 0, 0);
  if (zoomInBtn) zoomInBtn.onclick = () => renderer.animateTo(Math.min(4, renderer.zoom * 1.3), renderer.panX, renderer.panY);
  if (zoomOutBtn) zoomOutBtn.onclick = () => renderer.animateTo(Math.max(0.2, renderer.zoom / 1.3), renderer.panX, renderer.panY);

  const resizeHandler = () => renderer.resize();
  window.addEventListener('resize', resizeHandler);

  function animate(time) {
    sim.tick();
    renderer.render(time);
    state.graph = { sim, renderer, nodeMap, animId: requestAnimationFrame(animate), resizeHandler, opp_id };
  }
  state.graph = { sim, renderer, nodeMap, animId: requestAnimationFrame(animate), resizeHandler, opp_id };

  // Live WebSocket for graph updates
  connectLiveWebSocket(opp_id, sim, nodeMap, renderer, ws);

  // Poll agent status
  pollAgentStatus(opp_id);
}

function agentIcon(fn, color) {
  const svg = AGENT_ICONS[fn];
  if (svg) return svg;
  // Fallback: styled initial letter
  const letter = fn.replace(/^[^a-z]*/i, '').charAt(0).toUpperCase() || '?';
  return `<span style="font-size:18px;font-weight:800;line-height:1">${letter}</span>`;
}

function humanizeFunction(fn) {
  return fn.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderAssembleCards(el, opp_id, opp) {
  const roster = opp.roster || [];
  state._excludedAgents = state._excludedAgents || new Set();
  state._assembleRoster = roster;

  // Progress card
  let html = `
    <div class="setup-card">
      <div class="setup-card-title">Progress</div>
      <div class="setup-card-body">
        <div class="setup-phases">
          <div class="setup-phase complete"><span class="setup-phase-dot"></span><span class="text-xs">Refined</span></div>
          <span class="setup-phase-line"></span>
          <div class="setup-phase active"><span class="setup-phase-dot"></span><span class="text-xs">Assembling</span></div>
          <span class="setup-phase-line"></span>
          <div class="setup-phase"><span class="setup-phase-dot"></span><span class="text-xs">Ready</span></div>
        </div>
      </div>
    </div>`;

  // Condensed Opportunity card
  const oppType = opp.type ? `<span style="background:rgba(59,130,246,0.12);color:var(--color-info);padding:2px 8px;border-radius:var(--radius-xs);font-size:var(--text-xs);margin-left:8px">${esc(opp.type)}</span>` : '';
  html += `
    <div class="setup-card">
      <div class="setup-card-title" style="display:flex;align-items:center">Opportunity${oppType}</div>
      <div class="setup-card-body">
        <div style="font-weight:600;font-size:var(--text-sm);color:var(--text-primary)">${esc(opp.title || opp_id)}</div>
        ${opp.description ? `<div style="font-size:var(--text-xs);color:var(--text-muted);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(opp.description)}</div>` : ''}
      </div>
    </div>`;

  // Agent cards in setup-card
  html += `<div class="setup-card"><div class="setup-card-title">Investigation Team</div><div class="setup-card-body">`;
  html += `<div class="agent-card-grid">`;
  for (const entry of roster) {
    const fn = rosterFn(entry);
    const color = agentColor(fn);
    const excluded = state._excludedAgents.has(fn);
    const trackCount = (entry.investigation_tracks || []).length;

    html += `
      <div class="agent-card${excluded ? ' excluded' : ''}" data-fn="${esc(fn)}" onclick="openAgentDetail(this, event)">
        <div class="agent-card__accent" style="background:${color}"></div>
        <div class="agent-card__header">
          <div class="agent-card__icon" style="background:${color}">${agentIcon(fn, color)}</div>
          <div class="agent-card__info">
            <div class="agent-card__title">${esc(humanizeFunction(fn))}</div>
            <div class="agent-card__track-count">${trackCount} track${trackCount !== 1 ? 's' : ''}</div>
          </div>
          <div class="agent-card__actions">
            <div class="agent-toggle${excluded ? '' : ' on'}" onclick="toggleAgentInclude(event, '${esc(fn)}')">
              <div class="agent-toggle__knob"></div>
            </div>
          </div>
        </div>
      </div>`;
  }
  html += `</div>`;

  // Available but unselected agents
  const rosterFns = new Set(roster.map(r => rosterFn(r)));
  const availableAgents = state._availableAgents || {};
  const unselected = Object.entries(availableAgents).filter(([key]) => !rosterFns.has(key));
  if (unselected.length > 0) {
    html += `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">`;
    html += `<div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Available</div>`;

    for (const [key, agent] of unselected) {
      const color = agentColor(key);
      html += `
        <div class="agent-card" style="opacity:0.4" data-fn="${esc(key)}">
          <div class="agent-card__accent" style="background:${color}"></div>
          <div class="agent-card__header">
            <div class="agent-card__icon" style="background:${color}">${agentIcon(key, color)}</div>

function openAgentDetail(card, event) {
  if (event.target.closest('.agent-toggle')) return;
  const fn = card.dataset.fn;
  const roster = state._assembleRoster || [];
  const entry = roster.find(r => rosterFn(r) === fn);
  if (!entry) return;

  // Highlight active card
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');

  const color = agentColor(fn);
  const tracks = entry.investigation_tracks || [];
  const excluded = state._excludedAgents.has(fn);

  let html = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div class="agent-card__icon" style="background:${color};width:48px;height:48px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:var(--text-base)">${agentIcon(fn, color)}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:var(--text-md);color:var(--text-primary);text-transform:capitalize">${esc(humanizeFunction(fn))}</div>
        <div style="font-size:var(--text-xs);color:var(--text-muted);margin-top:2px">${tracks.length} track${tracks.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="agent-toggle${excluded ? '' : ' on'}" onclick="toggleAgentInclude(event, '${esc(fn)}')" style="flex-shrink:0">
        <div class="agent-toggle__knob"></div>
      </div>
    </div>`;

  // Tracks
  if (tracks.length) {
    html += `<div style="font-size:var(--text-xs);font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Tracks</div>`;
    for (const t of tracks) {
      if (typeof t === 'string') {
        html += `<div class="agent-card__track"><div class="agent-card__track-name">${esc(t)}</div></div>`;
      } else {
        html += `<div class="agent-card__track" style="margin-bottom:14px">
          <div class="agent-card__track-name" style="font-size:var(--text-sm);margin-bottom:4px">${esc(t.track || 'Track')}</div>
          ${t.question ? `<div class="agent-card__track-question" style="font-size:var(--text-xs);color:var(--text-muted);line-height:1.5">${esc(t.question)}</div>` : ''}
          ${t.expected_artifacts && t.expected_artifacts.length ? `<div class="agent-card__artifacts" style="margin-top:6px">${t.expected_artifacts.map(a => `<span class="agent-card__artifact-tag">${esc(a)}</span>`).join('')}</div>` : ''}
        </div>`;
      }
    }
  }

  openSlideOver(humanizeFunction(fn), html);
}

function toggleAgentInclude(event, fn) {
  event.stopPropagation();
  const toggle = event.currentTarget;
  const card = toggle.closest('.agent-card');
  if (state._excludedAgents.has(fn)) {
    state._excludedAgents.delete(fn);
    toggle.classList.add('on');
    card.classList.remove('excluded');
  } else {
    state._excludedAgents.add(fn);
    toggle.classList.remove('on');
    card.classList.add('excluded');
  }
  // Update roster summary
  const opp = state.currentOpp || {};
  const roster = opp.roster || [];
  const included = roster.filter(r => !state._excludedAgents.has(rosterFn(r)));
  const totalTracks = included.reduce((sum, r) => sum + (r.investigation_tracks || []).length, 0);
  const summary = document.querySelector('.roster-summary');
  if (summary) {
    summary.querySelector('.roster-summary__count').textContent = `${included.length} agent${included.length !== 1 ? 's' : ''} ready`;
    summary.querySelector('.roster-summary__tracks').textContent = `${totalTracks} track${totalTracks !== 1 ? 's' : ''}`;
  }
}

function loadConnectors() {
  state._enabledConnectors = state._enabledConnectors || new Set();
  api.get('catalog/tools').then(raw => {
    const tools = Array.isArray(raw) ? raw : Object.entries(raw || {}).map(([id, v]) => ({ id, name: v?.name || id, ...v }));
    state._setupCatalog = tools;
    const el = document.getElementById('setup-connectors-init');
    if (!el) return;
    if (tools.length > 0) {
      tools.forEach(t => state._enabledConnectors.add(t.id || t.name));
      el.innerHTML = '<div class="setup-connectors">' + tools.map(t => {
        const tid = esc(t.id || t.name || 'tool');
        return `<div class="setup-connector active" data-tool-id="${tid}" onclick="toggleConnector(this)">` +
          `<div class="setup-toggle-track"><div class="setup-toggle-knob"></div></div>` +
          `<span>${esc(t.name || t.id || 'tool')}</span></div>`;
      }).join('') + '</div>';
    } else {
      el.innerHTML = '<div class="muted-hint">No connectors configured</div>';
    }
  }).catch(err => {
    console.warn('Failed to load connectors:', err);
    const el = document.getElementById('setup-connectors-init');
    if (el) el.innerHTML = '<div class="muted-hint">No connectors configured</div>';
  });
}

async function transitionToPhase(newPhase, opp_id) {
  if (state.orbPhase === newPhase) return;
  const oldPhase = state.orbPhase;
  state.orbPhase = newPhase;

  const container = document.querySelector('.orb-split');
  const left = document.getElementById('inv-left');
  const right = document.getElementById('inv-right');
  if (!container || !left || !right) return;

  // Left panel changes only when entering/leaving investigate phase
  const leftChanges = (oldPhase === 'investigate') !== (newPhase === 'investigate');

  right.classList.add('phase-exit');
  if (leftChanges) left.classList.add('phase-exit');

  await new Promise(r => setTimeout(r, 250));

  container.dataset.phase = newPhase;
  const opp = state.currentOpp || {};
  renderRightPanel(newPhase, opp_id, opp);
  if (leftChanges) await renderLeftPanel(newPhase, opp_id, opp);

  right.classList.remove('phase-exit');
  right.classList.add('phase-enter');
  if (leftChanges) { left.classList.remove('phase-exit'); left.classList.add('phase-enter'); }

  await new Promise(r => setTimeout(r, 250));
  right.classList.remove('phase-enter');
  if (leftChanges) left.classList.remove('phase-enter');
}

function connectOrbWS(opp_id) {
  // Close existing connection if any
  if (state._setupWs && state._setupWs.readyState <= 1) {
    try { state._setupWs.close(); } catch {}
  }

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let opened = false;
  let retries = 0;
  const MAX_RETRIES = 5;
  let socket;
  try { socket = new WebSocket(`${proto}//${location.host}/ws/workspace/${opp_id}`); }
  catch { return; } // WS not supported
  state._setupWs = socket;

  const badge = document.getElementById('ws-status');
  if (badge) badge.innerHTML = '<span class="live-pulse"></span> connecting... <span class="ws-chevron">▾</span>';

  socket.onopen = () => {
    opened = true;
    retries = 0;
    const b = document.getElementById('ws-status');
    if (b) b.innerHTML = '<span class="live-pulse"></span> live <span class="ws-chevron">▾</span>';
  };

  socket.onmessage = async (e) => {
    try {
      const event = JSON.parse(e.data);
      if (event.type === 'opportunity' || event.type === 'contribution' || event.type === 'artifact') {
        await updateOrbPreview(opp_id);
      }
    } catch (err) { /* ignore parse errors */ }
  };

  socket.onerror = () => {};

  socket.onclose = () => {
    state._setupWs = null;
    const b = document.getElementById('ws-status');

    // Auto-reconnect if we're still on this workspace
    if (state.setupOppId === opp_id && retries < MAX_RETRIES) {
      retries++;
      const delay = Math.min(1000 * Math.pow(2, retries - 1), 10000);
      if (b) b.innerHTML = '<span class="status-dot" style="background:var(--color-amber)"></span> reconnecting... <span class="ws-chevron">▾</span>';
      setTimeout(() => {
        if (state.setupOppId === opp_id) connectOrbWS(opp_id);
      }, delay);
      return;
    }

    if (!b) return;
    b.innerHTML = opened
      ? '<span class="status-dot" style="background:var(--color-counter)"></span> disconnected <span class="ws-chevron">▾</span>'
      : '<span class="status-dot" style="background:var(--text-muted)"></span> offline <span class="ws-chevron">▾</span>';
  };
}

async function updateOrbPreview(opp_id) {
  const el = document.getElementById('inv-right');
  if (!el) return;
  try {
    const ws = await api.get(`workspaces/${opp_id}`);
    const opp = ws?.opportunity || {};
    state.currentOpp = opp;

    // Check for phase transition
    const newPhase = detectPhase(opp);
    if (newPhase !== state.orbPhase) {
      transitionToPhase(newPhase, opp_id);
      return;
    }

    // Fetch catalog tools once
    if (!state._setupCatalog) {
      try {
        const raw = await api.get('catalog/tools');
        state._setupCatalog = Array.isArray(raw) ? raw : Object.entries(raw || {}).map(([id, v]) => ({ id, name: v?.name || id, ...v }));
      } catch (err) { console.warn('Failed to load catalog tools:', err); state._setupCatalog = []; }
    }

    // Fetch available agents catalog once
    if (!state._availableAgents) {
      try { state._availableAgents = await api.get('catalog/agents'); } catch {}
    }

    // Re-render right panel with updated data
    renderRightPanel(state.orbPhase, opp_id, opp);
  } catch (err) {
    console.warn('updateOrbPreview error:', err);
  }
}

function toggleConnector(el) {
  const id = el.dataset.toolId;
  el.classList.toggle('active');
  if (el.classList.contains('active')) {
    state._enabledConnectors.add(id);
  } else {
    state._enabledConnectors.delete(id);
  }
}

// ── Setup Chat Functions ───────────────────────────────────
async function handleFirstMessage(text) {
  // Extract title from first sentence
  const title = (text.split(/[.!?\n]/)[0] || '').trim().slice(0, 80) || text.slice(0, 80);
  if (title.length < 10) { toast('Please describe in more detail (at least 10 characters)'); return; }

  state._setupState = 'running';
  updateActivityIndicator();
  updateSendButton(true);

  // Show user message in feed
  appendSetupMessage('you', 'var(--color-data)', text, false);

  try {
    // Create workspace
    const opp = await api.post('workspaces', {
      type: 'hypothesis',
      title: title,
      description: text,
      context_refs: [],
      assumptions: [],
      success_signals: [],
      kill_signals: [],
      enabled_tools: Array.from(state._enabledConnectors || []),
    });
    state.setupOppId = opp.id;

    // Update hash to include opp_id so refresh works
    if (state.view === 'orb') {
      history.replaceState(null, '', `#orb/${opp.id}`);
    }

    // Set status to assembled (required for launch)
    await api.patch(`workspaces/${opp.id}/opportunity`, { status: 'assembled' });

    // Launch Phase 0 agent
    await api.post(`launch/${opp.id}/start`, {});

    // Connect WebSocket for live workspace updates
    connectOrbWS(opp.id);

    // Start polling agent output
    pollSetupAgent(opp.id);

    // Show initial workspace preview
    updateOrbPreview(opp.id);
  } catch (err) { toast('Error: ' + err.message); }
}

async function sendSetupMessage(fromBtn) {
  const input = document.getElementById('setup-input');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';
  input.style.height = 'auto';
  const hints = document.getElementById('setup-hints');
  if (hints) hideHints(hints);

  if (state._setupState === 'idle') {
    // First message — create workspace and launch agent
    await handleFirstMessage(text);
    return;
  }

  if (state._setupState === 'waiting' && state._editMode) {
    // Edit mode first message — launch fresh agent on existing workspace
    state._editMode = false;
    appendSetupMessage('you', 'var(--color-data)', text, false);
    if (!state.setupOppId) return;
    try {
      state._setupState = 'running';
      state._setupSentAt = Date.now();
      updateActivityIndicator();
      updateSendButton(true);
      await api.post(`launch/${state.setupOppId}/start`, {});
      connectOrbWS(state.setupOppId);
      pollSetupAgent(state.setupOppId);
      updateOrbPreview(state.setupOppId);
      await api.post(`launch/${state.setupOppId}/send`, { message: text });
    } catch (err) { toast('Error: ' + err.message); }
    return;
  }

  // Subsequent messages — send to running agent or resume via --resume
  appendSetupMessage('you', 'var(--color-data)', text, false);
  if (!state.setupOppId) return;
  try {
    state._setupState = 'running';
    state._agentDuration = 0;
    state._agentStartTime = Date.now();
    updateActivityIndicator();
    updateSendButton(true);
    // Restart live timer tick
    if (state._activityTick) clearInterval(state._activityTick);
    state._activityTick = setInterval(() => {
      if (state._agentStartTime) updateActivityIndicator();
      else { clearInterval(state._activityTick); state._activityTick = null; }
    }, 1000);
    // Mark when we sent so poll doesn't race ahead of subprocess startup
    state._setupSentAt = Date.now();
    await api.post(`launch/${state.setupOppId}/send`, { message: text });
  } catch (err) { console.warn('sendSetupMessage error:', err); }
}

function showHints(hints) { hints.classList.remove('d-none'); }
function hideHints(hints) { hints.classList.add('d-none'); }
function hintsVisible(hints) { return !hints.classList.contains('d-none'); }

function handleSetupKey(e) {
  const hints = document.getElementById('setup-hints');
  if (hints && hintsVisible(hints)) {
    if (e.key === 'Escape') { hideHints(hints); return; }
    if (e.key === 'Tab' || (e.key === 'Enter' && hints.querySelector('.chat-hint-active'))) {
      e.preventDefault();
      const active = hints.querySelector('.chat-hint-active') || hints.querySelector('.chat-hint');
      if (active) {
        document.getElementById('setup-input').value = active.dataset.value + ' ';
        hideHints(hints);
      }
      return;
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      const items = [...hints.querySelectorAll('.chat-hint')];
      const idx = items.findIndex(i => i.classList.contains('chat-hint-active'));
      items.forEach(i => i.classList.remove('chat-hint-active'));
      const next = e.key === 'ArrowDown' ? Math.min(idx + 1, items.length - 1) : Math.max(idx - 1, 0);
      items[next]?.classList.add('chat-hint-active');
      return;
    }
  }
  // Escape stops agent when hints are not visible
  if (e.key === 'Escape' && (!hints || !hintsVisible(hints))) {
    if (state._setupState === 'running' || state._setupState === 'plan_ready') {
      stopAgent();
    }
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendSetupMessage();
  }
}

function handleSetupInput(e) {
  // Auto-grow textarea
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 200) + 'px';

  const val = e.target.value;
  const hints = document.getElementById('setup-hints');
  if (!hints) return;
  if (val.startsWith('/')) {
    const q = val.toLowerCase();
    const matches = SLASH_COMMANDS.filter(c => c.cmd.startsWith(q));
    if (matches.length && val.indexOf(' ') === -1) {
      hints.innerHTML = matches.map((m, i) =>
        `<div class="chat-hint${i === 0 ? ' chat-hint-active' : ''}" data-value="${m.cmd}">
          <span class="text-accent">${m.cmd}</span>
          <span class="text-muted ml-8">${m.desc}</span>
        </div>`
      ).join('');
      showHints(hints);
      return;
    }
  }
  // @ references — roster agents
  const atMatch = val.match(/@(\S*)$/);
  if (atMatch) {
    const q = atMatch[1].toLowerCase();
    const refs = [];
    const roster = state.workspaceData?.opportunity?.roster;
    if (roster) refs.push(...roster.map(r => ({ name: r.function, type: 'agent' })));
    const matches = refs.filter(r => r.name.toLowerCase().includes(q)).slice(0, 6);
    if (matches.length) {
      hints.innerHTML = matches.map((m, i) =>
        `<div class="chat-hint${i === 0 ? ' chat-hint-active' : ''}" data-value="${val.slice(0, val.length - atMatch[0].length)}@${m.name}">
          <span class="text-design">@${m.name}</span>
          <span class="text-muted ml-8">${m.type}</span>
        </div>`
      ).join('');
      showHints(hints);
      return;
    }
  }
  hideHints(hints);
}

async function stopAgent() {
  const opp_id = state.setupOppId || state.currentOpp?.id;
  if (!opp_id) return;
  try {
    const r = await fetch(`/api/launch/${opp_id}/stop`, { method: 'POST' });
    const d = await r.json();
    if (d.stopped) {
      if (state._setupPoll) { clearInterval(state._setupPoll); state._setupPoll = null; }
      if (state._agentPoll) { clearInterval(state._agentPoll); state._agentPoll = null; }
      state._setupState = 'waiting';
      state._agentStartTime = null;
      if (state._activityTick) { clearInterval(state._activityTick); state._activityTick = null; }
      updateActivityIndicator();
      updateSendButton(false);
      const feedId = state.view === 'orb' ? 'agent-feed' : 'setup-feed';
      const feed = document.getElementById(feedId);
      if (feed) {
        const div = document.createElement('div');
        div.className = 'ai-chat-msg';
        div.innerHTML = '<span class="ai-chat-label text-counter">stopped</span><span class="ai-chat-text">Agent stopped.</span>';
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
      }
      const chatInput = document.getElementById(state.view === 'orb' ? 'chat-input' : 'setup-input');
      if (chatInput) { chatInput.disabled = false; chatInput.focus(); }
    }
  } catch (err) { console.error('Stop failed:', err); }
}

async function restartAgent() {
  const opp_id = state.setupOppId || state.currentOpp?.id;
  if (!opp_id) return;
  try {
    const r = await fetch(`/api/launch/${opp_id}/restart`, { method: 'POST' });
    const d = await r.json();
    if (d.restarted) {
      if (state._setupPoll) { clearInterval(state._setupPoll); state._setupPoll = null; }
      if (state._agentPoll) { clearInterval(state._agentPoll); state._agentPoll = null; }
      if (state._activityTick) { clearInterval(state._activityTick); state._activityTick = null; }
      state._setupState = 'waiting';
      state._agentStartTime = null;
      state._isStale = false;
      state._setupOutputLen = 0;
      state._setupFeedLen = 0;
      updateActivityIndicator();
      updateSendButton(false);
      const feedId = state.view === 'orb' ? 'agent-feed' : 'setup-feed';
      const feed = document.getElementById(feedId);
      if (feed) {
        const div = document.createElement('div');
        div.className = 'ai-chat-msg';
        div.innerHTML = '<span class="ai-chat-label text-counter">restarted</span><span class="ai-chat-text">Agent restarted. Send a message to continue.</span>';
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
      }
      const chatInput = document.getElementById(state.view === 'orb' ? 'chat-input' : 'setup-input');
      if (chatInput) { chatInput.disabled = false; chatInput.placeholder = 'Send a message to restart...'; chatInput.focus(); }
    }
  } catch (err) { console.error('Restart failed:', err); }
}

async function resumeAfterError() {
  const opp_id = state.setupOppId || state.currentOpp?.id;
  if (!opp_id) return;
  try {
    state._setupState = 'running';
    state._setupOutputLen = 0;
    state._setupFeedLen = 0;
    state._setupSentAt = Date.now();
    await api.post(`launch/${opp_id}/send`, { message: 'Continue from where you left off.' });
    if (state.view === 'orb') { pollAgentStatus(); }
    else { pollSetupAgent(opp_id); }
    updateActivityIndicator();
  } catch (err) { console.error('Resume failed:', err); }
}

function updateSendButton(running) {
  const btnId = state.view === 'orb' ? 'chat-send-btn' : 'setup-send-btn';
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (running) {
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    btn.onclick = stopAgent;
    btn.title = 'Stop agent (Esc)';
    btn.classList.add('chat-send-btn--stop');
    btn.disabled = false;
  } else {
    if (btnId === 'setup-send-btn') {
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
      btn.onclick = sendSetupMessage;
    } else {
      btn.innerHTML = '&uarr;';
      btn.onclick = sendChatMessage;
    }
    btn.title = 'Send';
    btn.classList.remove('chat-send-btn--stop');
  }
}

function appendSetupMessage(label, color, text, isTool) {
  const feed = document.getElementById('setup-feed');
  if (!feed) return;
  const empty = feed.querySelector('.setup-chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'ai-chat-msg' + (isTool ? ' ai-tool' : '') + (label === 'you' ? ' ai-user' : '');
  div.innerHTML = `<span class="ai-chat-label" style="color:${color}">${esc(label)}</span><span class="ai-chat-text">${esc(text)}</span>`;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function pollSetupAgent(opp_id) {
  if (state._setupPoll) clearInterval(state._setupPoll);
  // Don't reset feed/output lengths if history was already rendered (both use full=true stream)
  if (!state._setupFeedLen) {
    state._setupOutputLen = 0;
    state._setupFeedLen = 0;
  }
  state._agentStartTime = Date.now();
  state._agentDuration = 0;
  state._agentCost = 0;
  state._agentTurns = 0;
  state._totalTokens = 0;
  state._setupHasPlan = false;
  state._setupPlanContent = '';
  state._setupInitSeen = false;

  async function check() {
    try {
      const s = await api.get(`launch/${opp_id}/status?full=true`);
      if (!document.getElementById('setup-feed')) { clearInterval(state._setupPoll); return; }

      if (s.output?.length) {
        updateSetupFeed(s.output);
        state._setupOutputLen = s.output.length;
      }

      // Grace period: don't detect "finished" within 5s of sending (subprocess startup race)
      const inGracePeriod = state._setupSentAt && (Date.now() - state._setupSentAt < 5000);

      if (!s.running && state._setupHasPlan) {
        state._setupState = 'plan_ready';
        showSetupApproveButton();
      } else if (!s.running && !inGracePeriod && state._setupOutputLen > 0 && state._setupState === 'running') {
        // Agent finished a turn — keep chat open for follow-up (multi-turn via --resume)
        state._setupState = 'waiting';
        state._agentTurns++;
        state._setupSentAt = null;
      } else if (!s.running && !inGracePeriod && state._setupState === 'running') {
        // Agent stopped without producing output or a plan — likely crashed
        const feed = document.getElementById('setup-feed');
        if (feed) {
          const div = document.createElement('div');
          div.className = 'ai-chat-msg';
          div.innerHTML = '<span class="ai-chat-label text-counter">error</span><span class="ai-chat-text">Agent stopped unexpectedly.</span> <a href="#" class="activity-restart" onclick="resumeAfterError();return false">Resume</a>';
          feed.appendChild(div);
          feed.scrollTop = feed.scrollHeight;
        }
        state._setupState = 'waiting';
        state._setupSentAt = null;
      } else if (s.running) {
        state._setupState = 'running';
        state._setupSentAt = null;
      }

      // Track stale state from backend
      state._isStale = !!s.stale;

      // Chat input — always typeable, placeholder signals state
      const chatInput = document.getElementById('setup-input');
      const chatBtn = document.getElementById('setup-send-btn');
      if (chatInput) {
        chatInput.disabled = false;
        if (state._setupState === 'waiting') {
          if (!document.querySelector('.evidence-modal-overlay')) chatInput.focus();
          chatInput.placeholder = 'Reply to continue the conversation...';
        } else if (state._setupState === 'running') {
          chatInput.placeholder = 'Agent is thinking...';
        }
      }
      if (chatBtn) chatBtn.disabled = state._setupState === 'plan_ready';
      if (!s.running) updateSendButton(false);
      else updateSendButton(true);
      updateActivityIndicator();
    } catch (err) { console.warn('pollSetupAgent network error:', err); }
  }
  check();
  state._setupPoll = setInterval(check, 3000);
  // Live-tick the activity timer every second while start time is set
  if (state._activityTick) clearInterval(state._activityTick);
  state._activityTick = setInterval(() => {
    if (state._agentStartTime) updateActivityIndicator();
    else { clearInterval(state._activityTick); state._activityTick = null; }
  }, 1000);
}

function updateActivityIndicator() {
  const el = document.getElementById('setup-activity');
  if (!el) return;

  // Status label
  let statusHtml = '';
  let isActive = false;
  if (state._setupState === 'running' && state._isStale) {
    statusHtml = '<span class="activity-dot activity-dot--stale"></span> Stuck <span class="text-muted" style="font-size:10px;margin-left:4px">Esc to stop</span> <a href="#" onclick="restartAgent();return false" class="activity-restart">Restart</a>';
    isActive = true;
  } else if (state._setupState === 'running') {
    statusHtml = '<span class="activity-dot"></span> Thinking <span class="text-muted" style="font-size:10px;margin-left:4px">Esc to stop</span>';
    isActive = true;
  } else if (state._setupState === 'waiting') {
    statusHtml = 'Ready';
  } else if (state._setupState === 'plan_ready') {
    statusHtml = 'Plan ready';
  }

  // Meta: tokens + time
  const meta = [];
  if (state._totalTokens > 0) {
    meta.push(state._totalTokens > 1_000_000
      ? (state._totalTokens / 1_000_000).toFixed(1) + 'M tok'
      : state._totalTokens > 1_000
        ? (state._totalTokens / 1_000).toFixed(0) + 'K tok'
        : state._totalTokens + ' tok');
  }
  if (state._agentStartTime) {
    const elapsed = state._agentDuration || (Date.now() - state._agentStartTime);
    const s = Math.floor(elapsed / 1000);
    const m = Math.floor(s / 60);
    meta.push(m > 0 ? `${m}m ${s % 60}s` : `${s}s`);
  }

  if (!statusHtml && !meta.length) {
    el.innerHTML = '';
    el.className = 'chat-activity';
    return;
  }

  el.className = isActive ? 'chat-activity active' : 'chat-activity';
  el.innerHTML =
    (statusHtml ? `<span class="activity-status">${statusHtml}</span>` : '') +
    (meta.length ? `<span class="activity-meta">${meta.join(' · ')}</span>` : '');
}

function updateSetupFeed(lines) {
  const feed = document.getElementById('setup-feed');
  if (!feed) return;
  let start = state._setupFeedLen || 0;
  // Detect output reset (new process via --resume)
  if (lines.length < start) start = 0;
  if (lines.length <= start) return;
  const newLines = lines.slice(start);
  state._setupFeedLen = lines.length;
  const messages = parseStreamJson(newLines, { fullText: true, suppressDone: true });
  if (!messages.length) return;

  const empty = feed.querySelector('.setup-chat-empty');
  if (empty) empty.remove();

  for (const m of messages) {
    // Detect context reads from tool calls
    if (m.isTool && m.label === 'read' && m.text) {
      const ctxMatch = m.text.match(/^(L[12][ab]?)\/([^/\s]+)/) || m.text.match(/data\/context\/([^/]+)\/([^/\s]+)/);
      if (ctxMatch) {
        const layerType = ctxMatch[1];
        const fileName = ctxMatch[2];
        const existing = state._loadedContext.find(c => c.fileName === fileName);
        if (!existing) {
          state._loadedContext.push({ layerType, fileName, name: fileName.replace('.json', '') });
          // Re-render preview to show new context layer
          if (state.setupOppId) {
            updateOrbPreview(state.setupOppId);
          }
        }
      }
    }

    // Detect plan mode
    if (m.label === 'plan') {
      state._setupHasPlan = true;
    }

    const div = document.createElement('div');
    div.className = 'ai-chat-msg' + (m.isTool ? ' ai-tool' : '');
