    if (m.isFullText) {
      div.innerHTML = `<span class="ai-chat-label" style="color:${m.color}">${esc(m.label)}</span><div class="ai-chat-text flex-1">${renderMarkdown(m.text)}</div>`;
    } else {
      div.innerHTML = `<span class="ai-chat-label" style="color:${m.color}">${esc(m.label)}</span><span class="ai-chat-text">${esc(m.text)}</span>`;
    }
    feed.appendChild(div);

    // Detect slash commands in agent output and surface action buttons
    if (m.isFullText && m.text) {
      const CMD_TRIGGERS = [
        { cmd: '/assemble', label: '\u2192 Move to /assemble', re: /\/assemble\b|ready to assemble|assemble.*(team|when you)/i },
        { cmd: '/orbit', label: '\u2192 Start orbit', re: /\/orbit\b|ready to orbit|start.*(orbit|investigation)/i },
      ];
      for (const { cmd, label, re } of CMD_TRIGGERS) {
        if (re.test(m.text) && !feed.querySelector(`.cmd-action-btn[data-cmd="${cmd}"]`)) {
          const btn = document.createElement('button');
          btn.className = 'cmd-action-btn';
          btn.dataset.cmd = cmd;
          btn.textContent = label;
          btn.onclick = () => handleCommandAction(cmd);
          feed.appendChild(btn);
        }
      }

      // Detect evidence/data questions and show gather chip
      if (EVIDENCE_TRIGGER_RE.test(m.text) && state.orbPhase === 'agree') {
        showEvidenceChips(feed);
      }
    }
  }
  feed.scrollTop = feed.scrollHeight;
}

async function handleCommandAction(cmd) {
  if (!state.setupOppId) return;
  const opp_id = state.setupOppId;

  if (cmd === '/assemble') {
    // Show the command in chat feed
    appendSetupMessage('you', 'var(--color-data)', '/assemble', false);

    try {
      // Stop current agree-phase agent if still running
      try { await api.post(`launch/${opp_id}/stop`, {}); } catch {}

      // Launch the assemble subprocess via dedicated endpoint
      state._setupState = 'running';
      state._agentStartTime = Date.now();
      updateActivityIndicator();
      updateSendButton(true);
      await api.post(`launch/${opp_id}/assemble`, {});
      // Fetch available agents catalog for showing unselected agents
      try { state._availableAgents = await api.get('catalog/agents'); } catch {}
      // Immediately transition UI to assemble phase (roster populates later via WS)
      transitionToPhase('assemble', opp_id);
      pollSetupAgent(opp_id);
    } catch (err) {
      toast('Error launching assemble: ' + err.message);
    }
    return;
  }

  if (cmd === '/orbit') {
    appendSetupMessage('you', 'var(--color-data)', '/orbit', false);

    try {
      // Stop current assemble-phase agent if still running
      try { await api.post(`launch/${opp_id}/stop`, {}); } catch {}

      // Launch parallel investigation via /start (detects roster → parallel mode)
      state._setupState = 'running';
      state._agentStartTime = Date.now();
      updateActivityIndicator();
      updateSendButton(true);
      await api.post(`launch/${opp_id}/start`, {});
      // Immediately transition UI to investigate phase (agents start producing data via WS)
      transitionToPhase('investigate', opp_id);
      pollSetupAgent(opp_id);
    } catch (err) {
      toast('Error launching orbit: ' + err.message);
    }
    return;
  }

  // Default: send as chat message
  const input = document.getElementById('setup-input');
  if (input) { input.value = cmd; sendSetupMessage(); }
}

// ── Evidence gathering ─────────────────────────────────────
const EVIDENCE_SOURCES = {
  'data-query':   { label: 'Data Query',    icon: '\uD83D\uDCCA', desc: 'SQL / BigQuery / analytics' },
  'doc-search':   { label: 'Doc Search',    icon: '\uD83D\uDCC4', desc: 'Internal documents & wikis' },
  'app-reviews':  { label: 'App Reviews',   icon: '\u2B50',       desc: 'App store ratings & feedback' },
  'slack-signal': { label: 'Slack Signal',  icon: '\uD83D\uDCAC', desc: 'Slack threads & discussions' },
  'market-intel': { label: 'Market Intel',  icon: '\uD83C\uDF10', desc: 'Competitor & market research' },
  'metrics-pull': { label: 'Metrics Pull',  icon: '\uD83D\uDCC8', desc: 'Dashboards & KPIs' },
};

const EVIDENCE_TRIGGER_RE = /\b(evidence|data|signal|NPS|metrics|research|reviews|feedback|insights|customer\s*research|app\s*reviews|user\s*feedback)\b/i;

function showEvidenceChips(feed) {
  if (!state.setupOppId || feed.querySelector('.evidence-chips')) return;
  const container = document.createElement('div');
  container.className = 'evidence-chips';
  const btn = document.createElement('button');
  btn.className = 'evidence-chip';
  btn.textContent = 'Gather Evidence';
  btn.onclick = () => openEvidenceModal();
  container.appendChild(btn);
  feed.appendChild(container);
  feed.scrollTop = feed.scrollHeight;
}

function openEvidenceModal(preselect) {
  if (document.querySelector('.evidence-modal-overlay')) return;
  const overlay = document.createElement('div');
  overlay.className = 'evidence-modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  // Pre-fill query from opportunity context — build a well-formatted research prompt
  const opp = state.currentOpp || {};
  const assumptions = (opp.assumptions || []).map(normalizeAssumption);
  const untested = assumptions.filter(a => !a.status || a.status === 'untested');
  const title = opp.title || '';
  const desc = opp.description || '';

  let prefill = '';
  if (title || desc) {
    // Build a structured research question
    const topic = title || desc.slice(0, 120);
    prefill = `Investigate: ${topic}\n\n`;
    if (desc && title) prefill += `Context: ${desc.length > 200 ? desc.slice(0, 200) + '...' : desc}\n\n`;
    if (untested.length) {
      prefill += `Key assumptions to validate:\n${untested.map((a, i) => `${i + 1}. ${a.content || a}`).join('\n')}\n\n`;
    }
    const signals = [...(opp.success_signals || []), ...(opp.kill_signals || [])].slice(0, 4);
    if (signals.length) {
      prefill += `Metrics to look for: ${signals.join(', ')}`;
    }
    prefill = prefill.trim();
  }

  // Pre-select sources if passed
  const preselected = new Set(preselect ? [preselect] : []);

  const sourceGrid = Object.entries(EVIDENCE_SOURCES).map(([key, s]) =>
    `<label class="evidence-source-check${preselected.has(key) ? ' checked' : ''}" data-source="${key}">
      <input type="checkbox" class="evidence-source-cb" data-source="${key}" ${preselected.has(key) ? 'checked' : ''} />
      <span class="source-label">${s.icon} ${s.label}</span>
      <span class="source-desc">${s.desc}</span>
    </label>`
  ).join('');

  overlay.innerHTML = `
    <div class="evidence-modal">
      <div class="evidence-modal-header">
        <h3>Gather Evidence</h3>
        <p>Select sources and describe what to look for</p>
      </div>
      <div class="evidence-modal-body" id="evidence-modal-body">
        <label class="evidence-query-label" for="evidence-query-input">What should the agent look for?</label>
        <textarea class="evidence-query-input evidence-query-textarea" placeholder="Describe what evidence you need..."
               id="evidence-query-input">${esc(prefill)}</textarea>
        <label class="evidence-query-label" style="margin-top:var(--space-5)">Sources</label>
        <div class="evidence-source-grid">${sourceGrid}</div>
      </div>
      <div class="evidence-modal-footer">
        <button class="evidence-btn-cancel" onclick="this.closest('.evidence-modal-overlay').remove()">Cancel</button>
        <button class="evidence-btn-gather" id="evidence-gather-btn" disabled>Gather</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // Checkbox toggle styling
  overlay.querySelectorAll('.evidence-source-cb').forEach(cb => {
    cb.onchange = () => {
      cb.closest('.evidence-source-check').classList.toggle('checked', cb.checked);
      updateGatherBtn();
    };
  });

  const queryInput = overlay.querySelector('#evidence-query-input');
  const gatherBtn = overlay.querySelector('#evidence-gather-btn');

  function getSelectedSources() {
    return [...overlay.querySelectorAll('.evidence-source-cb:checked')].map(cb => cb.dataset.source);
  }

  function updateGatherBtn() {
    gatherBtn.disabled = getSelectedSources().length === 0 || !queryInput.value.trim();
  }
  queryInput.addEventListener('input', updateGatherBtn);
  updateGatherBtn(); // initial state (prefill may enable it)

  setTimeout(() => queryInput.focus(), 100);

  async function launchGather() {
    const sources = getSelectedSources();
    if (!sources.length || !queryInput.value.trim()) return;
    const query = queryInput.value.trim();
    gatherBtn.disabled = true;
    gatherBtn.textContent = 'Gathering...';

    try {
      // Launch gather for all selected sources
      const promises = sources.map(src =>
        api.post(`evidence/${state.setupOppId}/gather`, { source_type: src, query })
      );
      await Promise.allSettled(promises);

      // Switch modal to review mode — poll for results
      showEvidenceReview(overlay, sources, query);
    } catch (err) {
      gatherBtn.textContent = 'Failed — retry';
      gatherBtn.disabled = false;
      toast('Evidence gather failed: ' + err.message);
    }
  }
  gatherBtn.onclick = launchGather;
}

function showEvidenceReview(overlay, sources, query) {
  const body = overlay.querySelector('#evidence-modal-body');
  const footer = overlay.querySelector('.evidence-modal-footer');
  if (!body || !footer) return;

  // Replace body with review loading state
  body.innerHTML = `
    <div class="evidence-review">
      <div class="evidence-review__status">
        <span class="evidence-card-status gathering">Gathering from ${sources.length} source${sources.length > 1 ? 's' : ''}...</span>
      </div>
      <div class="evidence-review__results" id="evidence-review-results"></div>
    </div>`;

  footer.innerHTML = `
    <button class="evidence-btn-cancel" onclick="this.closest('.evidence-modal-overlay').remove()">Cancel</button>
    <button class="evidence-btn-gather" id="evidence-accept-btn" disabled>Accept Selected</button>`;

  const resultsEl = body.querySelector('#evidence-review-results');
  const acceptBtn = footer.querySelector('#evidence-accept-btn');

  // Poll for results
  let pollCount = 0;
  const maxPolls = 40; // ~2 min at 3s intervals
  const pollInterval = setInterval(async () => {
    pollCount++;
    try {
      const data = await api.get(`evidence/${state.setupOppId}/status`);
      if (!data) return;

      // Render results as they come in
      let hasResults = false;
      for (const src of sources) {
        const lines = (data.evidence_outputs || {})[src] || [];
        if (!lines.length) continue;
        hasResults = true;
        let cardEl = resultsEl.querySelector(`[data-review-source="${src}"]`);
        if (!cardEl) {
          cardEl = document.createElement('div');
          cardEl.className = 'evidence-review-card';
          cardEl.dataset.reviewSource = src;
          resultsEl.appendChild(cardEl);
        }
        const srcMeta = EVIDENCE_SOURCES[src] || { label: src, icon: '🔍' };
        const displayLines = lines
          .map(l => { try { const j = JSON.parse(l); return j.content || j.result || ''; } catch { return l; } })
          .filter(Boolean)
          .map(l => (l.includes('budget_exceeded') || l.includes('Budget has been exceeded'))
            ? 'API budget limit reached. Check your Anthropic account billing settings.'
            : l);
        cardEl.innerHTML = `
          <div class="evidence-review-card__header">
            <label class="evidence-review-card__check">
              <input type="checkbox" class="evidence-review-cb" data-source="${src}" checked />
              <span>${srcMeta.icon} ${esc(srcMeta.label)}</span>
            </label>
            <span class="evidence-card-status ${data.running ? 'gathering' : 'completed'}">${data.running ? 'Gathering...' : 'Done'}</span>
          </div>
          <div class="evidence-review-card__body">
            ${displayLines.map(l => `<div class="evidence-review-line">${renderMarkdown(l)}</div>`).join('')}
          </div>`;
      }

      // Update accept button
      if (hasResults) {
        acceptBtn.disabled = false;
        acceptBtn.textContent = `Accept Selected`;
      }

      // Stop polling when done
      if (!data.running || pollCount >= maxPolls) {
        clearInterval(pollInterval);
        const statusEl = body.querySelector('.evidence-review__status');
        if (statusEl) {
          if (data.running) {
            statusEl.innerHTML = `<span class="evidence-card-status failed">Timed out — review what was collected</span>`;
          } else {
            statusEl.innerHTML = `<span class="evidence-card-status completed">Collection complete — review before accepting</span>`;
          }
        }
      }
    } catch (err) {
      console.warn('Evidence review poll error:', err);
    }
  }, 3000);

  // Accept handler
  acceptBtn.onclick = () => {
    clearInterval(pollInterval);
    const accepted = [...resultsEl.querySelectorAll('.evidence-review-cb:checked')].map(cb => cb.dataset.source);
    overlay.remove();

    // Add evidence cards for accepted sources
    for (const src of accepted) {
      addEvidenceCard(src, query);
    }
    startEvidencePolling();
    toast(`Accepted evidence from ${accepted.length} source${accepted.length > 1 ? 's' : ''}`);
  };
}

function addEvidenceCard(sourceType, query) {
  const feed = document.getElementById('setup-feed');
  if (!feed) return;
  const src = EVIDENCE_SOURCES[sourceType] || { label: sourceType, icon: '\uD83D\uDD0D' };
  const cardId = `evidence-card-${sourceType}`;
  // Remove existing card for same source type
  const existing = feed.querySelector(`#${cardId}`);
  if (existing) existing.remove();

  const card = document.createElement('div');
  card.className = 'evidence-card';
  card.id = cardId;
  const freshnessPill = (() => {
    const maxAgeDays = (state.qualityConfig?.evidence_max_age_days) || 30;
    if (card._gatheredAt) {
      const ageDays = (Date.now() - card._gatheredAt) / 86400000;
      if (ageDays > maxAgeDays) return `<span class="gate-pill gate-pill--warn" style="font-size:9px;margin-left:6px">STALE</span>`;
    }
    return '';
  })();
  card._gatheredAt = Date.now();
  card.onclick = () => openEvidenceDetail(sourceType);
  card.style.cursor = 'pointer';
  card.innerHTML = `
    <div class="evidence-card-header">
      <span class="evidence-card-icon">${src.icon}</span>
      <span class="evidence-card-title">${esc(src.label)}</span>
      ${freshnessPill}
      <span class="evidence-card-status gathering">Gathering...</span>
    </div>
    <div class="evidence-card-query">${esc(query)}</div>
    <div class="evidence-card-output"></div>`;
  feed.appendChild(card);
  feed.scrollTop = feed.scrollHeight;
}

function startEvidencePolling() {
  if (state._evidencePolling) return;
  state._evidencePolling = setInterval(pollEvidenceStatus, 3000);
  pollEvidenceStatus();
}

async function pollEvidenceStatus() {
  if (!state.setupOppId) { stopEvidencePolling(); return; }
  try {
    const data = await api.get(`evidence/${state.setupOppId}/status`);
    if (!data) return;

    // Update cards with output
    for (const [src, lines] of Object.entries(data.evidence_outputs || {})) {
      const card = document.getElementById(`evidence-card-${src}`);
      if (!card) continue;
      const outputEl = card.querySelector('.evidence-card-output');
      if (outputEl && lines.length) {
        // Parse stream-json lines for display text
        const displayLines = lines
          .map(l => { try { const j = JSON.parse(l); return j.content || j.result || ''; } catch { return l; } })
          .filter(Boolean)
          .map(l => (l.includes('budget_exceeded') || l.includes('Budget has been exceeded'))
            ? 'API budget limit reached. Check your Anthropic account billing settings.'
            : l)
          .slice(-5);
        if (displayLines.length) outputEl.textContent = displayLines.join('\n');
      }
    }

    // Check if done
    if (!data.running) {
      stopEvidencePolling();
      // Mark all gathering cards as completed
      document.querySelectorAll('.evidence-card-status.gathering').forEach(el => {
        el.className = 'evidence-card-status completed';
        el.textContent = 'Done';
      });
      // Load evidence findings, then auto-continue the agent
      await loadEvidenceFindings();
      autoResumeAfterEvidence();
    }
  } catch (err) {
    console.warn('Evidence poll error:', err);
  }
}

function stopEvidencePolling() {
  if (state._evidencePolling) {
    clearInterval(state._evidencePolling);
    state._evidencePolling = null;
  }
}

function renderFindingWithSources(f, opts) {
  const text = f.content || f.finding || f.text || '';
  if (!text) return `<li>${esc(JSON.stringify(f))}</li>`;

  // Linkify source references:
  // 1. "(Source: https://...)" — direct URL
  // 2. "(#channel-name, Author, Date)" — Slack channel deep link
  // 3. "(Source: ...)" — plain text reference
  let html = esc(text);

  // URLs anywhere in the text
  html = html.replace(/(https?:\/\/[^\s),&lt;]+)/g,
    url => `<a href="${url}" target="_blank" rel="noopener" class="evidence-source-link">${url.length > 60 ? url.slice(0, 57) + '...' : url} ↗</a>`
  );

  // Slack channel references: (#channel-name, Author, Date)
  html = html.replace(
    /\((#[\w-]+),\s*([^,)]+),\s*([^)]+)\)/g,
    (_, channel, author, date) => {
      const ch = channel.slice(1); // remove #
      return `(<a href="https://talabat.slack.com/channels/${ch}" target="_blank" rel="noopener" class="evidence-source-link">${channel}</a>, <span class="evidence-source-ref">${author.trim()}, ${date.trim()}</span>)`;
    }
  );

  // Standalone #channel-name not already linked
  html = html.replace(
    /(?<!href="[^"]*)(#(?:[\w][\w-]{2,}))/g,
    (m) => {
      if (m.startsWith('#&')) return m; // skip HTML entities
      const ch = m.slice(1);
      return `<a href="https://talabat.slack.com/channels/${ch}" target="_blank" rel="noopener" class="evidence-source-link">${m}</a>`;
    }
  );

  // Build metric badge if present
  let badge = '';
  if (f.metric) {
    const val = f.value != null ? ` ${f.value}` : '';
    const trend = f.trend ? ` ${f.trend}` : '';
    badge = `<span class="evidence-metric-badge">${esc(f.metric)}${esc(val)}${esc(trend)}</span> `;
  }
  return `<li>${badge}${html}</li>`;
}

async function loadEvidenceFindings() {
  if (!state.setupOppId) return;
  try {
    const ws = await api.get(`workspaces/${state.setupOppId}`);
    if (!ws?.evidence) return;
    for (const ev of ws.evidence) {
      const src = ev.source_type;
      const card = document.getElementById(`evidence-card-${src}`);
      if (!card) continue;
      // Evidence freshness warning
      if (ev.gathered_at) {
        const maxAgeDays = (state.qualityConfig?.evidence_max_age_days) || 30;
        const ageDays = (Date.now() - new Date(ev.gathered_at).getTime()) / 86400000;
        if (ageDays > maxAgeDays) {
          const header = card.querySelector('.evidence-card-header');
          if (header && !header.querySelector('.gate-pill--warn')) {
            const pill = document.createElement('span');
            pill.className = 'gate-pill gate-pill--warn';
            pill.style.cssText = 'font-size:9px;margin-left:6px';
            pill.textContent = 'STALE';
            header.insertBefore(pill, header.querySelector('.evidence-card-status'));
          }
        }
      }
      const outputEl = card.querySelector('.evidence-card-output');
      if (outputEl && ev.status === 'completed') {
        outputEl.className = 'evidence-card-findings';
        const summaryHtml = ev.summary ? `<p class="evidence-summary">${esc(ev.summary)}</p>` : '';
        const sourceHtml = ev.source_detail ? `<p class="evidence-source-detail">Source: <strong>${esc(ev.source_detail)}</strong></p>` : '';
        const findingsHtml = (ev.findings || []).slice(0, 5)
          .map(f => renderFindingWithSources(f)).join('');
        outputEl.innerHTML = summaryHtml + sourceHtml +
          (findingsHtml ? `<ul class="evidence-findings-list">${findingsHtml}</ul>` : '');
      } else if (outputEl && ev.status === 'failed') {
        const statusEl = card.querySelector('.evidence-card-status');
        if (statusEl) { statusEl.className = 'evidence-card-status failed'; statusEl.textContent = 'Failed'; }
      }
    }
  } catch (err) {
    console.warn('Evidence findings load error:', err);
  }
}

// ── Evidence detail slide-over + approval ─────────────────
async function openEvidenceDetail(sourceType) {
  if (!state.setupOppId) return;
  const src = EVIDENCE_SOURCES[sourceType] || { label: sourceType, icon: '🔍', desc: '' };
  try {
    const ws = await api.get(`workspaces/${state.setupOppId}`);
    const ev = (ws?.evidence || []).find(e => e.source_type === sourceType);
    if (!ev) { toast('No evidence found for ' + src.label); return; }

    const statusClass = ev.status === 'completed' ? 'completed' : ev.status === 'failed' ? 'failed' : 'gathering';
    const confidenceHtml = ev.confidence
      ? `<span class="evidence-approval-badge evidence-approval-badge--${ev.confidence === 'high' ? 'approved' : 'pending'}">${esc(ev.confidence)} confidence</span>`
      : '';
    const approvalHtml = ev.approval_status
      ? `<span class="evidence-approval-badge evidence-approval-badge--${ev.approval_status}">${esc(ev.approval_status)}</span>`
      : '';

    const summaryHtml = ev.summary
      ? `<div class="evidence-detail-summary">${renderMarkdown(ev.summary)}</div>`
      : '';

    const findings = ev.findings || [];
    let findingsHtml = '';
    if (findings.length) {
      const findingItems = findings.map((f, idx) => {
        const fStatus = f.approval_status || '';
        const approveClass = fStatus === 'approved' ? 'evidence-btn-approve--active' : '';
        const rejectClass = fStatus === 'rejected' ? 'evidence-btn-reject--active' : '';
        const rendered = renderFindingWithSources(f);
        return `<li class="evidence-finding-row">
          <div class="evidence-finding-content">${rendered.replace(/^<li>/, '').replace(/<\/li>$/, '')}</div>
          <div class="evidence-finding-actions">
            <button class="evidence-btn-sm evidence-btn-approve ${approveClass}" title="Approve"
              ${fStatus === 'approved' ? 'disabled' : ''}
              onclick="setFindingApproval('${state.setupOppId}','${ev.id}',${idx},'approved','${sourceType}')">&#10003;</button>
            <button class="evidence-btn-sm evidence-btn-reject ${rejectClass}" title="Reject"
              ${fStatus === 'rejected' ? 'disabled' : ''}
              onclick="setFindingApproval('${state.setupOppId}','${ev.id}',${idx},'rejected','${sourceType}')">&#10007;</button>
          </div>
        </li>`;
      }).join('');
      findingsHtml = `<h4 style="margin:0 0 8px;font-size:13px;color:var(--text-primary)">Findings — review each</h4>
        <ol class="evidence-detail-findings">${findingItems}</ol>`;
    }

    const metaItems = [];
    if (ev.query) metaItems.push(`<strong>Query:</strong> ${esc(ev.query)}`);
    if (ev.source_detail) metaItems.push(`<strong>Source:</strong> ${esc(ev.source_detail)}`);
    if (ev.created_at) metaItems.push(`<strong>Started:</strong> ${new Date(ev.created_at).toLocaleString()}`);
    if (ev.completed_at) metaItems.push(`<strong>Completed:</strong> ${new Date(ev.completed_at).toLocaleString()}`);
    const metaHtml = metaItems.length
      ? `<div class="evidence-detail-meta">${metaItems.join('<br>')}</div>`
      : '';

    // Show bulk approve/reject as secondary action
    const reviewedCount = findings.filter(f => f.approval_status).length;
    const approvedCount = findings.filter(f => f.approval_status === 'approved').length;
    const progressHtml = findings.length
      ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:12px">${reviewedCount}/${findings.length} reviewed, ${approvedCount} approved</div>`
      : '';
    const allApproveDisabled = ev.approval_status === 'approved' ? 'disabled' : '';
    const allRejectDisabled = ev.approval_status === 'rejected' ? 'disabled' : '';

    const html = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <span class="evidence-card-status ${statusClass}">${esc(ev.status || 'unknown')}</span>
        ${confidenceHtml}
        ${approvalHtml}
      </div>
      ${summaryHtml}
      ${findingsHtml}
      ${progressHtml}
      ${metaHtml}
      <div style="display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);align-items:center">
        <button class="evidence-btn-approve" ${allApproveDisabled} style="font-size:12px"
          onclick="setEvidenceApproval('${state.setupOppId}','${ev.id}','approved','${sourceType}')">Approve All</button>
        <button class="evidence-btn-reject" ${allRejectDisabled} style="font-size:12px"
          onclick="setEvidenceApproval('${state.setupOppId}','${ev.id}','rejected','${sourceType}')">Reject All</button>
      </div>`;

    openSlideOver(`${src.icon} ${src.label}`, html);
  } catch (err) {
    console.warn('Evidence detail error:', err);
    toast('Failed to load evidence detail');
  }
}

async function setEvidenceApproval(oppId, evidenceId, status, sourceType) {
  try {
    await api.patch(`evidence/${oppId}/${evidenceId}`, { approval_status: status });
    toast(`Evidence ${status}`);
    openEvidenceDetail(sourceType);
    const card = document.getElementById(`evidence-card-${sourceType}`);
    if (card) {
      let badge = card.querySelector('.evidence-approval-badge');
      if (!badge) {
        badge = document.createElement('span');
        const header = card.querySelector('.evidence-card-header');
        if (header) header.appendChild(badge);
      }
      badge.className = `evidence-approval-badge evidence-approval-badge--${status}`;
      badge.textContent = status;
    }
    // Refresh framing quality score
    if (state.setupOppId) loadFramingQuality(state.setupOppId);
  } catch (err) {
    console.warn('Evidence approval error:', err);
    toast('Failed to update approval: ' + err.message);
  }
}

async function setFindingApproval(oppId, evidenceId, findingIndex, status, sourceType) {
  try {
    await api.patch(`evidence/${oppId}/${evidenceId}/findings/${findingIndex}`, { approval_status: status });
    toast(`Finding ${status}`);
    openEvidenceDetail(sourceType);
    // Refresh framing quality score
    if (state.setupOppId) loadFramingQuality(state.setupOppId);
  } catch (err) {
    console.warn('Finding approval error:', err);
    toast('Failed to update finding: ' + err.message);
  }
}

async function openSignalDetail(itemType, index) {
  try {
    const ws = await api.get(`workspaces/${state.setupOppId}`);
    if (!ws) { toast('Could not load workspace'); return; }
    const opp = ws.opportunity || {};
    let item, title, dotColor;
    if (itemType === 'assumption') {
      const raw = (opp.assumptions || [])[index];
      item = normalizeAssumption(raw, index);
      title = 'Assumption';
      dotColor = 'var(--color-neutral-light)';
    } else if (itemType === 'success_signal') {
      item = (opp.success_signals || [])[index];
      if (typeof item === 'string') item = { content: item };
      title = 'Success Signal';
      dotColor = 'var(--color-accent)';
    } else {
      item = (opp.kill_signals || [])[index];
      if (typeof item === 'string') item = { content: item };
      title = 'Kill Signal';
      dotColor = 'var(--color-counter)';
    }
    if (!item) { toast('Item not found'); return; }

    const text = item.content || item.text || item.signal || '';
    const pills = [];
    if (item.status) pills.push(`<span class="gate-pill gate-pill--${item.status === 'validated' ? 'pass' : item.status === 'invalidated' ? 'fail' : 'warn'}">${esc(item.status)}</span>`);
    if (item.importance) pills.push(`<span class="gate-pill gate-pill--${item.importance === 'critical' ? 'fail' : item.importance === 'high' ? 'warn' : 'pass'}">${esc(item.importance)}</span>`);
    const pillsHtml = pills.length ? `<div style="display:flex;gap:6px;margin-bottom:12px">${pills.join('')}</div>` : '';

    const metaItems = [];
    if (item.id) metaItems.push(`<strong>ID:</strong> ${esc(item.id)}`);
    if (item.confidence != null) metaItems.push(`<strong>Confidence:</strong> ${item.confidence}`);
    if (item.source) metaItems.push(`<strong>Source:</strong> ${esc(item.source)}`);
    const metaHtml = metaItems.length ? `<div class="evidence-detail-meta" style="margin-top:16px">${metaItems.join('<br>')}</div>` : '';

    // Find provenance from refinement_history
    const history = opp.refinement_history || [];
    const provEntries = history.filter(h => {
      const d = (h.details || '').toLowerCase();
      return d.includes(text.substring(0, 30).toLowerCase());
    });
    const provHtml = provEntries.length
      ? `<div style="margin-top:16px"><div class="text-xs text-muted mb-4" style="font-weight:600">PROVENANCE</div>${provEntries.map(h =>
          `<div class="text-sm text-secondary" style="margin-bottom:6px"><span class="gate-pill gate-pill--pass">${esc(h.action || 'added')}</span> ${esc(h.details || '')}<div class="text-xs text-muted mt-2">${h.timestamp ? new Date(h.timestamp).toLocaleString() : ''}</div></div>`
        ).join('')}</div>`
      : '';

    const html = `
      <div style="margin-bottom:12px"><span class="opp-signal-dot" style="background:${dotColor};display:inline-block;vertical-align:middle;margin-right:8px"></span><span class="text-md font-weight-500">${esc(text)}</span></div>
      ${pillsHtml}${metaHtml}${provHtml}`;
    openSlideOver(title, html);
  } catch (err) {
    console.warn('Signal detail error:', err);
    toast('Failed to load detail');
  }
}

function autoResumeAfterEvidence() {
  if (!state.setupOppId) return;
  // Only auto-resume if the agree agent is waiting for input
  if (state._setupState !== 'waiting') return;
  const msg = 'Evidence gathered. Please review the evidence files and continue refining the opportunity.';
  const feed = document.getElementById('setup-feed');
  if (feed) {
    const div = document.createElement('div');
    div.className = 'ai-chat-msg';
    div.innerHTML = `<span class="ai-chat-label">system</span><span class="ai-chat-text" style="color:var(--text-muted);font-style:italic">Auto-continuing with gathered evidence...</span>`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }
  api.post(`launch/${state.setupOppId}/send`, { message: msg }).catch(err => {
    console.warn('Auto-resume after evidence failed:', err);
  });
  state._setupState = 'running';
  state._setupSentAt = Date.now();
  state._agentStartTime = Date.now();
  updateSendButton(true);
  updateActivityIndicator();
}

function showSetupApproveButton() {
  const feed = document.getElementById('setup-feed');
  if (!feed || feed.querySelector('.setup-approve-btn')) return;
  if (state._setupPlanContent) {
    const planDiv = document.createElement('div');
    planDiv.className = 'ai-chat-msg plan-preview';
    planDiv.textContent = state._setupPlanContent;
    feed.appendChild(planDiv);
  }
  const btn = document.createElement('button');
  btn.className = 'setup-approve-btn approve-btn';
  btn.textContent = 'Launch Orb';
  btn.onclick = handleSetupApprove;
  feed.appendChild(btn);
  feed.scrollTop = feed.scrollHeight;
}

async function handleSetupApprove() {
  if (!state.setupOppId) return;
  const btn = document.querySelector('.setup-approve-btn');
  if (btn) { btn.textContent = 'Launching...'; btn.disabled = true; }
  try {
    await api.post(`launch/${state.setupOppId}/approve`, {});
    if (btn) { btn.textContent = 'Launched'; btn.style.borderColor = '#10B981'; }
    state._setupHasPlan = false;
    // Navigate to workspace view
    setTimeout(() => navigate('orb', { opp_id: state.setupOppId }), 1500);
  } catch (err) {
    if (btn) { btn.textContent = 'Launch failed — retry'; btn.disabled = false; }
  }
}

function renderPreviewCards(opp, catalog, loadedContext) {
  // Phase indicator
  const hasRoster = opp.roster && opp.roster.length > 0;
  const phase = opp.status === 'orbiting' ? 'ready' : hasRoster ? 'assembling' : 'refining';
  const phases = [
    { key: 'refining', label: 'Refining' },
    { key: 'assembling', label: 'Assembling' },
    { key: 'ready', label: 'Ready' },
  ];
  const phaseHtml = phases.map((p, i) => {
    const status = p.key === phase ? 'active' : (phases.findIndex(x => x.key === phase) > i ? 'complete' : '');
    return `<div class="setup-phase ${status}">
      <span class="setup-phase-dot"></span>
      <span class="text-xs">${p.label}</span>
    </div>${i < phases.length - 1 ? '<span class="setup-phase-line"></span>' : ''}`;
  }).join('');

  // Opportunity card — rich view with signals
  const oppType = opp.type || 'hypothesis';
  const oppTitle = esc(opp.title || 'Untitled');
  const oppDesc = esc(opp.description || '');

  function renderSignalSection(title, items, dotColor, showTitle = true, itemType = null) {
    if (!items || !items.length) return '';
    return `<div class="opp-signals">
      ${showTitle ? `<div class="opp-signals-title">${title} (${items.length})</div>` : ''}
      ${items.map((s, idx) => {
        const text = typeof s === 'string' ? s : (s.content || s.text || s.signal || '');
        if (!text) return '';
        const conf = s.confidence;
        const source = s.source;
        let meta = '';
        if (conf || source) {
          const confBar = conf ? `<span class="signal-conf signal-conf--${conf}">${conf}</span>` : '';
          const srcTag = source ? `<span class="signal-source">${esc(source)}</span>` : '';
          meta = `<div class="signal-meta">${confBar}${srcTag}</div>`;
        }
        const clickAttr = itemType ? ` onclick="openSignalDetail('${itemType}',${idx})" style="cursor:pointer"` : '';
        const chevron = itemType ? '<span class="text-muted gap-ctx-chevron">&rsaquo;</span>' : '';
        return `<div class="opp-signal-item"${clickAttr}><span class="opp-signal-dot" style="background:${dotColor}"></span><div class="signal-content"><span>${esc(text)}</span>${meta}</div>${chevron}</div>`;
      }).join('')}
    </div>`;
  }

  const assumptionsHtml = renderSignalSection('Assumptions', (opp.assumptions || []).map(normalizeAssumption), 'var(--color-neutral-light)', false, 'assumption');
  const successHtml = renderSignalSection('Success Signals', opp.success_signals, 'var(--color-accent)', true, 'success_signal');
  const killHtml = renderSignalSection('Kill Signals', opp.kill_signals, 'var(--color-counter)', true, 'kill_signal');

  // Context card — only show what agent has loaded
  let contextHtml = '';
  if (loadedContext.length === 0) {
    contextHtml = '<div class="muted-hint">Agent will load relevant context...</div>';
  } else {
    contextHtml = loadedContext.map(c => {
      return `<div class="setup-ctx-layer clickable" onclick="openContextSlideOver('${esc(c.layerType)}','${esc(c.name)}')">
        <span class="sufficiency-dot sufficient"></span>
        <span>${esc(c.layerType)}/${esc(c.name)}</span>
        <span class="text-muted gap-ctx-chevron">&rsaquo;</span>
      </div>`;
    }).join('');
  }

  // Roster card
  const roster = opp.roster || [];
  let rosterHtml = '';
  if (roster.length === 0) {
    rosterHtml = '<div class="muted-hint">Agent will recommend team...</div>';
  } else {
    rosterHtml = roster.map(r => {
      const fn = rosterFn(r) || 'unknown';
      return `<span class="setup-roster-chip"><span class="setup-roster-dot" style="background:${agentColor(fn)}"></span>${esc(fn)}</span>`;
    }).join('');
  }

  // Connectors card — toggle switches
  const enabled = state._enabledConnectors || new Set();
  let connectorsHtml = '';
  if (Array.isArray(catalog) && catalog.length > 0) {
    connectorsHtml = catalog.map(t => {
      const tid = esc(t.id || t.name || 'tool');
      const isActive = enabled.has(t.id || t.name);
      return `<div class="setup-connector ${isActive ? 'active' : ''}" data-tool-id="${tid}" onclick="toggleConnector(this)">` +
        `<div class="setup-toggle-track"><div class="setup-toggle-knob"></div></div>` +
        `<span>${esc(t.name || t.id || 'tool')}</span></div>`;
    }).join('');
  } else {
    connectorsHtml = '<div class="muted-hint">No connectors configured</div>';
  }

  return `
    <div class="setup-card">
      <div class="setup-card-title">Progress</div>
      <div class="setup-card-body">
        <div class="setup-phases">${phaseHtml}</div>
      </div>
    </div>
    <div class="setup-card" id="framing-quality-card">
      <div class="setup-card-title">Framing Quality</div>
      <div class="setup-card-body" id="framing-quality-body">
        <div class="muted-hint">Loading...</div>
      </div>
    </div>
    <div class="setup-card">
      <div class="setup-card-title">Opportunity</div>
      <div class="setup-card-body">
        <span class="ws-type mb-6 inline-block">${oppType}</span>
        <div class="text-md font-weight-500 mb-4">${oppTitle}</div>
        <div class="text-sm text-secondary lh-16">${oppDesc}</div>
      </div>
    </div>
    ${assumptionsHtml ? `<div class="setup-card">
      <div class="setup-card-title">Assumptions${(opp.assumptions||[]).length ? ` (${(opp.assumptions||[]).length})` : ''}</div>
      <div class="setup-card-body">${assumptionsHtml}</div>
    </div>` : ''}
    ${successHtml || killHtml ? `<div class="setup-card">
      <div class="setup-card-title">Signals</div>
      <div class="setup-card-body">${successHtml}${killHtml}</div>
    </div>` : ''}
    <div class="setup-card">
      <div class="setup-card-title">Context${loadedContext.length ? ` (${loadedContext.length})` : ''}</div>
      <div class="setup-card-body">${contextHtml}</div>
    </div>
    <div class="setup-card">
      <div class="setup-card-title">Roster</div>
      <div class="setup-card-body">${rosterHtml}</div>
    </div>
    <div class="setup-card">
      <div class="setup-card-title">Connectors</div>
      <div class="setup-card-body">
        <div class="setup-connectors">${connectorsHtml}</div>
      </div>
    </div>`;
}

function sufficiencyDot(suf) {
  if (!suf) return '';
  const s = suf.status || 'sufficient';
  return `<span class="sufficiency-dot ${s}"></span>`;
}

function renderSidebar(ws, opp_id) {
  const opp = ws.opportunity;
  const activeTab = state.sidebarTab || 'overview';

  // ── Tab bar ──
  const tabBar = `<div class="sidebar-tabs">
    <button class="sidebar-tab ${activeTab === 'overview' ? 'active' : ''}" onclick="switchSidebarTab('overview')">Overview</button>
    <button class="sidebar-tab ${activeTab === 'evidence' ? 'active' : ''}" onclick="switchSidebarTab('evidence')">Evidence</button>
    <button class="sidebar-tab ${activeTab === 'agents' ? 'active' : ''}" onclick="switchSidebarTab('agents')">Agents</button>
    <button class="sidebar-tab ${activeTab === 'quality' ? 'active' : ''}" onclick="switchSidebarTab('quality')">Quality</button>
  </div>`;

  // ── Overview tab: Synthesis + Assumptions ──
  let overview = '';
  if (ws.synthesis) {
    overview += `
      <div class="sidebar-section">
        <div class="sidebar-section-title">Synthesis</div>
        <div class="card card--accent-left">
          <div class="subheading mb-4 text-accent">${esc(ws.synthesis?.verdict || ws.synthesis?.decision || 'Complete')}</div>
          <div class="text-sm text-secondary lh-16">${esc(ws.synthesis?.verdict_summary || ws.synthesis?.executive_summary || '')}</div>
        </div>
      </div>`;
  }
  if (opp.assumptions?.length) {
    overview += `
      <div class="sidebar-section">
        <div class="sidebar-section-title">Assumptions (${opp.assumptions.length})</div>
        ${opp.assumptions.map(normalizeAssumption).map(a => `
          <div class="finding-card neutral" style="border-left-color:${IMP_COLORS[a.importance] || '#64748B'}">
            <div class="finding-header">
              <span class="finding-type" style="color:${IMP_COLORS[a.importance] || '#64748B'}">${a.importance || 'medium'}</span>
              <span class="finding-conf">${a.status || 'untested'}</span>
            </div>
            <div class="finding-text">${esc(a.content)}</div>
          </div>`).join('')}
      </div>`;
  }
  if (!overview) overview = '<div class="muted-hint" style="padding:16px 0">No synthesis or assumptions yet.</div>';

  // ── Evidence tab: Contributions + Reviews + Artifacts ──
  let evidence = '';
  if (ws.contributions?.length) {
    evidence += `
      <div class="sidebar-section">
        <div class="sidebar-section-title">Contributions (${ws.contributions.length})</div>
        <div class="contrib-list" id="contrib-list">
          ${ws.contributions.map(c => {
            const fn = c.filename.replace('.json', '').replace(/-round-\d+/, '');
            const qBadge = c.quality_score != null
              ? `<span class="gate-pill gate-pill--${qualityScoreClass(c.quality_score)}" style="margin-left:auto;font-size:9px">${Math.round(c.quality_score * 100)}%</span>`
              : '';
            return `<div class="contrib-item" data-file="${c.filename}" onclick="toggleContribution('${opp_id}','${c.filename}')" style="display:flex;align-items:center">
                <div class="contrib-dot" style="background:${agentColor(fn)}"></div>
                <div class="contrib-name">${c.filename}</div>
                ${qBadge}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }
  if (ws.reviews?.length) {
    evidence += `
      <div class="sidebar-section">
        <div class="sidebar-section-title">Reviews (${ws.reviews.length})</div>
        <div class="contrib-list">
          ${ws.reviews.map(r => `<div class="contrib-item" onclick="toggleReview('${opp_id}','${r.filename}')">
                <div class="contrib-dot bg-data"></div>
                <div class="contrib-name">${r.filename}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }
  if (ws.artifacts?.length) {
    evidence += `
      <div class="sidebar-section">
        <div class="sidebar-section-title">Artifacts (${ws.artifacts.length})</div>
        <div class="contrib-list">
          ${ws.artifacts.map(a => `<div class="contrib-item" onclick="toggleArtifact('${opp_id}','${a.filename}')">
              <div class="contrib-dot bg-design"></div>
              <div class="contrib-name">${a.filename}</div>
              <div class="contrib-badge">.${a.type || 'md'}</div>
          </div>`).join('')}
        </div>
      </div>`;
  }
  if (!evidence) evidence = '<div class="muted-hint" style="padding:16px 0">No evidence collected yet.</div>';

  // ── Agents tab: Roster + Activity Feed ──
  let agents = '';
  if (opp.roster?.length) {
    agents += `
      <div class="flex flex-wrap gap-6 mb-12">
        ${opp.roster.map(r => `
          <div class="setup-roster-chip">
            <span class="setup-roster-dot" style="background:${agentColor(rosterFn(r))}"></span>
            ${rosterFn(r)}
          </div>`).join('')}
      </div>`;
  }
  agents += `<div id="agent-stats" class="flex flex-wrap gap-12 font-mono text-xs text-muted mb-8 d-none" style="padding:6px 0"></div>`;
  agents += `<div id="agent-feed"><div class="ai-empty">No agent activity yet.</div></div>`;

  // ── Quality tab ──
  let quality = `<div id="quality-tab-content"><div class="muted-hint" style="padding:16px 0">Loading quality data...</div></div>`;

  const sidebarContent = document.getElementById('sidebar-content');
  if (sidebarContent) sidebarContent.innerHTML = tabBar +
    `<div class="sidebar-tab-content ${activeTab === 'overview' ? 'active' : ''}" data-tab="overview">${overview}</div>` +
    `<div class="sidebar-tab-content ${activeTab === 'evidence' ? 'active' : ''}" data-tab="evidence">${evidence}</div>` +
    `<div class="sidebar-tab-content ${activeTab === 'agents' ? 'active' : ''}" data-tab="agents">${agents}</div>` +
    `<div class="sidebar-tab-content ${activeTab === 'quality' ? 'active' : ''}" data-tab="quality">${quality}</div>`;
  // Show chat input bar when Agents tab is active
  const chatBar = document.getElementById('chat-input-bar');
  if (chatBar) chatBar.style.display = activeTab === 'agents' ? '' : 'none';

  // Load quality data if quality tab is active
  if (activeTab === 'quality') loadQualityTab(opp_id);
}

function switchSidebarTab(tab) {
  state.sidebarTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.textContent.trim().toLowerCase() === tab));
  document.querySelectorAll('.sidebar-tab-content').forEach(p => p.classList.toggle('active', p.dataset.tab === tab));
  const chatBar = document.getElementById('chat-input-bar');
  if (chatBar) chatBar.style.display = tab === 'agents' ? '' : 'none';
}

// Slide-over panel
function openSlideOver(title, html) {
  const soTitle = document.getElementById('slide-over-title');
  const soBody = document.getElementById('slide-over-body');
  const so = document.getElementById('slide-over');
  const soBg = document.getElementById('slide-over-backdrop');
  if (soTitle) soTitle.textContent = title;
  if (soBody) soBody.innerHTML = html;
  if (so) so.classList.add('open');
  if (soBg) soBg.classList.add('open');
}
function closeSlideOver() {
  const so = document.getElementById('slide-over');
  const soBg = document.getElementById('slide-over-backdrop');
  if (so) so.classList.remove('open');
  if (soBg) soBg.classList.remove('open');
  document.querySelectorAll('.agent-card.active').forEach(c => c.classList.remove('active'));
}

// ── Edit Opportunity slide-over ──
async function openEditOpportunity(oppId) {
  try {
    const [opp, ctxLayers] = await Promise.all([
      api.get('workspaces/' + oppId).then(ws => ws.opportunity),
      api.get('context')
    ]);
    // Working copies for array editing
    state._editAssumptions = (opp.assumptions || []).map(normalizeAssumption).map(a => ({...a}));
    state._editSuccessSignals = [...(opp.success_signals || [])];
    state._editKillSignals = [...(opp.kill_signals || [])];
    state._editContextRefs = [...(opp.context_refs || [])];
    state._editRoster = (opp.roster || []).map(r => ({...r}));
    state._editOppId = oppId;

    const typeOptions = ['hypothesis','problem','question'].map(t =>
      `<option value="${t}" ${opp.type === t ? 'selected' : ''}>${t}</option>`).join('');

    // Group context layers by layer_type
    const grouped = {};
    (ctxLayers || []).forEach(l => { (grouped[l.layer_type] = grouped[l.layer_type] || []).push(l); });
    const layerOrder = ['L1','L2a','L2b'];

    let ctxHtml = '';
    layerOrder.forEach(lt => {
      if (!grouped[lt]) return;
      ctxHtml += `<div class="edit-ctx-group-label">${lt}</div>`;
      grouped[lt].forEach(l => {
        const checked = state._editContextRefs.includes(l.id) ? 'checked' : '';
        ctxHtml += `<label class="edit-ctx-row"><input type="checkbox" ${checked} onchange="toggleEditContext('${l.id}')"><span>${esc(l.name)}</span><span class="text-muted text-2xs">${l.id}</span></label>`;
      });
    });

    const html = `
      <div class="flex flex-col">
        <div class="edit-card">
          <div class="edit-card-title">Opportunity</div>
          <input class="edit-input" id="edit-title" value="${esc(opp.title || '')}" placeholder="What are you investigating...">
          <div class="mt-8">
            <textarea class="edit-textarea" id="edit-description" rows="2" placeholder="Describe the opportunity...">${esc(opp.description || '')}</textarea>
          </div>
          <div class="flex items-center gap-8 mt-8">
            <span class="text-xs text-muted">Type</span>
            <select class="edit-select" id="edit-type">${typeOptions}</select>
          </div>
        </div>
        <div class="edit-card">
          <div class="edit-card-title">Assumptions</div>
          <div id="edit-assumptions-list">${renderEditAssumptions()}</div>
          <div class="edit-add-row">
            <input class="edit-input" id="edit-new-assumption" placeholder="Add assumption...">
            <select class="edit-select" id="edit-new-assumption-imp" style="width:auto"><option value="critical">critical</option><option value="high" selected>high</option><option value="medium">medium</option><option value="low">low</option></select>
            <button class="edit-add-btn" onclick="addEditAssumption()">+</button>
          </div>
        </div>
        <div class="edit-card">
          <div class="edit-card-title">Signals</div>
          <div class="mb-8">
            <div class="text-muted uppercase mb-4 label-9px">Success</div>
            <div id="edit-success-list">${renderEditSignals('success')}</div>
            <div class="edit-add-row">
              <input class="edit-input" id="edit-new-success" placeholder="Add success signal...">
              <button class="edit-add-btn" onclick="addEditSignal('success')">+</button>
            </div>
          </div>
          <div>
            <div class="text-muted uppercase mb-4 label-9px">Kill</div>
            <div id="edit-kill-list">${renderEditSignals('kill')}</div>
            <div class="edit-add-row">
              <input class="edit-input" id="edit-new-kill" placeholder="Add kill signal...">
              <button class="edit-add-btn" onclick="addEditSignal('kill')">+</button>
            </div>
          </div>
        </div>
        <div class="edit-card">
          <div class="edit-card-title">Context</div>
          ${ctxHtml}
        </div>
        <div class="edit-card">
          <div class="edit-card-title">Roster</div>
          <div id="edit-roster-list">${renderEditRoster()}</div>
          <div class="edit-add-row">
            <input class="edit-input" id="edit-new-roster" placeholder="Add agent (e.g. analyst)...">
            <button class="edit-add-btn" onclick="addEditRosterMember()">+</button>
          </div>
        </div>
        <button class="edit-save-btn" onclick="saveOpportunityEdits('${oppId}')">Save Changes</button>
      </div>`;
    openSlideOver('Edit Opportunity', html);
  } catch (err) { toast('Failed to load opportunity: ' + err.message); }
}

function renderEditAssumptions() {
  return state._editAssumptions.map((a, i) => `
    <div class="edit-tag"><span>${esc(a.content)}</span><span class="text-2xs text-muted ml-4">${a.importance || 'medium'}</span><button class="edit-tag-remove" onclick="removeEditItem('assumptions',${i})">&times;</button></div>
  `).join('');
}
function renderEditSignals(type) {
  const arr = type === 'success' ? state._editSuccessSignals : state._editKillSignals;
  const cls = type === 'success' ? 'success' : 'kill';
  return arr.map((s, i) => `
    <div class="edit-tag ${cls}"><span>${esc(s)}</span><button class="edit-tag-remove" onclick="removeEditItem('${type}Signals',${i})">&times;</button></div>
  `).join('');
}
function renderEditRoster() {
  return state._editRoster.map((r, i) => `
    <div class="edit-tag"><span class="status-dot" style="background:${agentColor(rosterFn(r))}"></span><span>${esc(rosterFn(r))}</span><button class="edit-tag-remove" onclick="removeEditItem('roster',${i})">&times;</button></div>
  `).join('');
}

function removeEditItem(type, index) {
  if (type === 'assumptions') { state._editAssumptions.splice(index, 1); const el = document.getElementById('edit-assumptions-list'); if (el) el.innerHTML = renderEditAssumptions(); }
  else if (type === 'successSignals') { state._editSuccessSignals.splice(index, 1); const el = document.getElementById('edit-success-list'); if (el) el.innerHTML = renderEditSignals('success'); }
  else if (type === 'killSignals') { state._editKillSignals.splice(index, 1); const el = document.getElementById('edit-kill-list'); if (el) el.innerHTML = renderEditSignals('kill'); }
  else if (type === 'roster') { state._editRoster.splice(index, 1); const el = document.getElementById('edit-roster-list'); if (el) el.innerHTML = renderEditRoster(); }
}

function addEditAssumption() {
  const input = document.getElementById('edit-new-assumption');
  const imp = document.getElementById('edit-new-assumption-imp');
  if (!input.value.trim()) return;
  const id = 'asm-' + String(state._editAssumptions.length + 1).padStart(3, '0');
  state._editAssumptions.push({ id, content: input.value.trim(), status: 'untested', importance: imp.value });
  input.value = '';
  document.getElementById('edit-assumptions-list').innerHTML = renderEditAssumptions();
}

function addEditSignal(type) {
  const input = document.getElementById('edit-new-' + type);
  if (!input.value.trim()) return;
  if (type === 'success') state._editSuccessSignals.push(input.value.trim());
  else state._editKillSignals.push(input.value.trim());
  input.value = '';
  document.getElementById('edit-' + type + '-list').innerHTML = renderEditSignals(type);
}

function toggleEditContext(ref) {
  const idx = state._editContextRefs.indexOf(ref);
  if (idx >= 0) state._editContextRefs.splice(idx, 1);
  else state._editContextRefs.push(ref);
}

function addEditRosterMember() {
  const input = document.getElementById('edit-new-roster');
  if (!input.value.trim()) return;
  state._editRoster.push({ function: input.value.trim(), rationale: '', investigation_tracks: [], tool_access: [] });
  input.value = '';
  document.getElementById('edit-roster-list').innerHTML = renderEditRoster();
}

async function saveOpportunityEdits(oppId) {
  const title = document.getElementById('edit-title').value.trim();
  const description = document.getElementById('edit-description').value.trim();
  const type = document.getElementById('edit-type').value;
  if (!title) { toast('Title is required'); return; }

  // Normalize roster to always use 'function' key
  const roster = state._editRoster.map(r => ({
    function: rosterFn(r),
    rationale: r.rationale || '',
    investigation_tracks: r.investigation_tracks || [],
    tool_access: r.tool_access || []
  }));

  try {
    const updated = await api.patch('workspaces/' + oppId + '/opportunity', {
      title, description, type,
      assumptions: state._editAssumptions,
      success_signals: state._editSuccessSignals,
      kill_signals: state._editKillSignals,
      context_refs: state._editContextRefs,
      roster
    });

    // Update local state and re-render
    state.currentOpp = updated;
    const ws = await api.get('workspaces/' + oppId);
    const statusClass = 'status-' + (updated.status || 'unknown');
    const sidebarHdr = document.getElementById('sidebar-header');
    if (sidebarHdr) sidebarHdr.innerHTML = `
      <div class="flex items-center gap-12 mb-8 flex-wrap">
        <span class="status-pill ${statusClass}">${updated.status}</span>
        <span class="text-xs font-mono text-muted">${updated.id}</span>
        <button class="edit-opp-btn" onclick="openEditOpportunity('${oppId}')" title="Edit opportunity">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      <div class="subheading mb-12 lh-14">${esc(updated.title)}</div>`;
    renderSidebar(ws, oppId);
    closeSlideOver();
    toast('Opportunity updated');
  } catch (err) { toast('Failed to save: ' + err.message); }
}

async function openContextSlideOver(layerType, name) {
  try {
    const data = await api.get(`context/${layerType}/${name}`);
    if (!data) return;
    const title = data.name || `${layerType}/${name}`;
    const html = `
      <div class="ctx-tabs">
        <button class="ctx-tab active" onclick="switchCtxTab(this,'summary')">Summary</button>
        <button class="ctx-tab" onclick="switchCtxTab(this,'raw')">Sources</button>
        <button class="ctx-tab" onclick="switchCtxTab(this,'graph')">Knowledge Graph</button>
      </div>
      <div id="ctx-summary" class="ctx-tab-content active">${renderContextSummary(data)}</div>
      <div id="ctx-raw" class="ctx-tab-content">${renderContextSources(data)}</div>
      <div id="ctx-graph" class="ctx-tab-content"><canvas id="ctx-graph-canvas" class="ctx-graph-canvas"></canvas></div>`;
    openSlideOver(title, html);
  } catch (err) { toast('Failed to load context: ' + err.message); }
}

function switchCtxTab(btn, tab) {
  btn.parentElement.querySelectorAll('.ctx-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const panel = btn.closest('#slide-over-body');
  panel.querySelectorAll('.ctx-tab-content').forEach(c => c.classList.remove('active'));
  panel.querySelector('#ctx-' + tab).classList.add('active');
  if (tab === 'graph') requestAnimationFrame(async () => await renderContextGraph(panel));
}

function renderContextSummary(data) {
  const c = data.content || {};
  let html = '';
  // Overview
  if (c.product_overview || c.market_overview || c.mission) {
    const overview = c.product_overview || c.market_overview || c.mission;
    html += `<div class="ctx-summary-section"><h3>Overview</h3><div class="ctx-summary-item">${inlineFormat(overview)}</div></div>`;
  }
  if (c.strategy) {
    html += `<div class="ctx-summary-section"><h3>Strategy</h3><div class="ctx-summary-item">${inlineFormat(c.strategy)}</div></div>`;
  }
  // Personas
  if (c.personas?.length) {
    html += `<div class="ctx-summary-section"><h3>Personas (${c.personas.length})</h3>`;
    c.personas.forEach(p => {
      html += `<div class="ctx-summary-item"><strong>${esc(p.name)}</strong><br>${esc(p.description)}</div>`;
    });
    html += '</div>';
  }
  // Competitors
  if (c.competitors?.length) {
    html += `<div class="ctx-summary-section"><h3>Competitors (${c.competitors.length})</h3>`;
    c.competitors.forEach(comp => {
      let detail = esc(comp.positioning || '');
      if (comp.strengths?.length) detail += '<br><span class="text-accent">+</span> ' + comp.strengths.map(esc).join(', ');
      if (comp.weaknesses?.length) detail += '<br><span class="text-counter">-</span> ' + comp.weaknesses.map(esc).join(', ');
      html += `<div class="ctx-summary-item"><strong>${esc(comp.name)}</strong><br>${detail}</div>`;
    });
    html += '</div>';
  }
  // Goals
  if (c.goals?.length) {
    html += `<div class="ctx-summary-section"><h3>Goals</h3>`;
    c.goals.forEach(g => { html += `<div class="ctx-summary-item">${esc(typeof g === 'string' ? g : g.goal || JSON.stringify(g))}</div>`; });
    html += '</div>';
  }
  // Voice of customer
  if (c.voice_of_customer) {
    const voc = c.voice_of_customer;
    html += `<div class="ctx-summary-section"><h3>Voice of Customer</h3>`;
    if (voc.love?.length) html += `<div class="ctx-summary-item"><strong class="text-accent">Love</strong><br>${voc.love.map(esc).join('<br>')}</div>`;
    if (voc.frustration?.length) html += `<div class="ctx-summary-item"><strong class="text-counter">Frustration</strong><br>${voc.frustration.map(esc).join('<br>')}</div>`;
    if (voc.wishes?.length) html += `<div class="ctx-summary-item"><strong class="text-design">Wishes</strong><br>${voc.wishes.map(esc).join('<br>')}</div>`;
    if (voc.churn_signals?.length) html += `<div class="ctx-summary-item"><strong class="text-brief">Churn Signals</strong><br>${voc.churn_signals.map(esc).join('<br>')}</div>`;
    html += '</div>';
  }
  // Org metrics
  if (c.org_metrics?.length) {
    html += `<div class="ctx-summary-section"><h3>Metrics</h3>`;
    c.org_metrics.forEach(m => {
      html += `<div class="ctx-summary-item"><strong>${esc(m.name || m.metric || '')}</strong>: ${esc(m.value || m.target || '')}</div>`;
    });
    html += '</div>';
  }
  // Sufficiency
  if (data.sufficiency) {
    const suf = data.sufficiency;
    const dotClass = suf.status === 'sufficient' ? 'sufficient' : 'gaps_identified';
    html += `<div class="ctx-summary-section"><h3>Data Quality</h3>
      <div class="ctx-summary-item"><span class="sufficiency-dot ${dotClass}"></span> ${esc(suf.status)}`;
    if (suf.gaps?.length) {
      html += '<br>' + suf.gaps.map(g => `<span class="text-brief text-xs">${esc(g.field)}: ${esc(g.description)}</span>`).join('<br>');
    }
    html += '</div></div>';
  }
  if (!html) html = '<div class="ctx-empty">No structured content found.</div>';
  return html;
}

function renderContextSources(data) {
  const sources = data.sources || [];
  if (!sources.length) {
    return '<div class="ctx-empty ctx-empty--padded">No source attribution available for this context layer.</div>';
  }
  const icons = {
    slack: '\u{1F4AC}', bigquery: '\u{1F4CA}', document: '\u{1F4C4}', interview: '\u{1F399}\uFE0F',
    dashboard: '\u{1F4C8}', survey: '\u{1F4CB}', analytics: '\u{1F4C9}', report: '\u{1F4D1}',
  };
  let html = '';
  sources.forEach(s => {
    const icon = icons[s.type] || '\u{1F4C4}';
    const nameHtml = s.url
      ? `<a href="${esc(s.url)}" target="_blank" rel="noopener" class="ctx-link">${esc(s.name)}</a>`
      : `<strong>${esc(s.name)}</strong>`;
    const fieldsHtml = (s.fields_informed || []).map(f =>
      `<span class="source-field-chip">${esc(f)}</span>`
    ).join('');
    html += `<div class="ctx-source-item">
      <div class="source-item-row">
        <span class="source-item-icon">${icon}</span>
        <div class="flex-1">
          <div>${nameHtml} <span class="source-type-badge">${esc(s.type)}</span></div>
          ${s.description ? `<div class="source-desc">${esc(s.description)}</div>` : ''}
        </div>
        ${s.date ? `<span class="source-date">${esc(s.date)}</span>` : ''}
      </div>
      ${fieldsHtml ? `<div class="source-fields">${fieldsHtml}</div>` : ''}
    </div>`;
  });
  return html;
}

async function renderContextGraph(panel) {
  const canvas = panel.querySelector('#ctx-graph-canvas');
  if (!canvas || canvas.dataset.rendered) return;
  canvas.dataset.rendered = '1';
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  // Loading state
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('Loading context map...', W/2, H/2);

  // Fetch context layers — scoped to opportunity's context_refs when available
  let allLayers;
  try { allLayers = await api.get('context'); } catch (err) { console.warn('Failed to load context layers:', err); return; }
  if (!allLayers?.length) return;

  const contextRefs = state.currentOpp?.context_refs;
  const scopedLayers = contextRefs?.length
    ? allLayers.filter(l => contextRefs.includes(l.id))
    : allLayers;
  if (!scopedLayers.length) return;

  // Fetch full data for each scoped layer
  const docs = [];
  for (const layer of scopedLayers) {
    try {
      const full = await api.get(`context/${layer.layer_type}/${layer.file_name}`);
      if (full) docs.push({ ...full, _layerType: layer.layer_type, _fileName: layer.file_name });
    } catch (err) { console.warn('Failed to load context layer:', err); }
  }

  // Figure out which doc is currently active in the slide-over
  const slideTitle = document.querySelector('#slide-over-title')?.textContent || '';
  const activeId = docs.find(d => slideTitle.includes(d.name))?.id;

  // Extract entities per doc for relationship detection
  function extractEntities(doc) {
    const c = doc.content || {};
    const entities = { personas: new Set(), competitors: new Set(), goals: new Set() };
    (c.personas || []).forEach(p => { if (p.name) entities.personas.add(p.name.toLowerCase()); });
    (c.competitors || []).forEach(comp => { if (comp.name) entities.competitors.add(comp.name.toLowerCase()); });
    (c.goals || []).forEach(g => {
      const text = typeof g === 'string' ? g : (g.goal || '');
      text.toLowerCase().split(/\s+/).filter(w => w.length > 4).slice(0, 3).forEach(w => entities.goals.add(w));
    });
    return entities;
  }

  const docEntities = docs.map(d => ({ doc: d, entities: extractEntities(d) }));

  // Layer type colors
  const layerColors = { L1: '#10B981', L2a: '#8B5CF6', L2b: '#3B82F6' };

  // Build nodes — one per document
  const nodes = docs.map((d, i) => {
    const lt = d._layerType || 'L1';
    return {
      id: d.id, label: d.name || d.id, layerType: lt,
      color: layerColors[lt] || '#64748B', isActive: d.id === activeId,
      x: 0, y: 0,
    };
  });

  // Build edges — shared entities between documents
  const edges = [];
  for (let i = 0; i < docEntities.length; i++) {
    for (let j = i + 1; j < docEntities.length; j++) {
      const a = docEntities[i], b = docEntities[j];
      const shared = [];
      const pIntersect = [...a.entities.personas].filter(x => b.entities.personas.has(x));
      if (pIntersect.length) shared.push(`${pIntersect.length} persona${pIntersect.length > 1 ? 's' : ''}`);
      const cIntersect = [...a.entities.competitors].filter(x => b.entities.competitors.has(x));
      if (cIntersect.length) shared.push(`${cIntersect.length} competitor${cIntersect.length > 1 ? 's' : ''}`);
      const gIntersect = [...a.entities.goals].filter(x => b.entities.goals.has(x));
      if (gIntersect.length >= 2) shared.push('goals');
      if (shared.length) {
        edges.push({ from: a.doc.id, to: b.doc.id, label: shared.join(', '), weight: pIntersect.length + cIntersect.length + (gIntersect.length >= 2 ? 1 : 0) });
      }
    }
  }

  // Also add hierarchy edges: L1 → L2a, L1 → L2b
  const l1 = nodes.find(n => n.layerType === 'L1');
  if (l1) {
    nodes.filter(n => n.layerType !== 'L1').forEach(n => {
      if (!edges.find(e => (e.from === l1.id && e.to === n.id) || (e.from === n.id && e.to === l1.id))) {
        edges.push({ from: l1.id, to: n.id, label: '', weight: 0.5, isHierarchy: true });
      }
    });
  }

  if (nodes.length === 0) return;

  // Clear canvas
  ctx.clearRect(0, 0, W, H);

  // Layout: group by layer type
  const pad = 40;
  const cx = W / 2, cy = H / 2;
  // Place L1 at center, L2a nodes in upper arc, L2b nodes in lower arc
  nodes.forEach((n, i) => {
    if (n.layerType === 'L1') { n.x = cx; n.y = cy; return; }
    const group = nodes.filter(nd => nd.layerType === n.layerType);
    const idx = group.indexOf(n);
    const count = group.length;
    if (n.layerType === 'L2a') {
      const span = Math.PI * 0.8;
      const start = Math.PI + (Math.PI - span) / 2;
      const angle = count === 1 ? Math.PI * 1.5 : start + (idx / (count - 1)) * span;
      const r = Math.min(W, H) * 0.34;
      n.x = cx + Math.cos(angle) * r;
      n.y = cy + Math.sin(angle) * r;
    } else {
      const span = Math.PI * 0.8;
      const start = (Math.PI - span) / 2;
      const angle = count === 1 ? Math.PI * 0.5 : start + (idx / (count - 1)) * span;
      const r = Math.min(W, H) * 0.34;
      n.x = cx + Math.cos(angle) * r;
      n.y = cy + Math.sin(angle) * r;
    }
  });

  // Force relaxation — push apart overlapping nodes
  for (let iter = 0; iter < 20; iter++) {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
        const minD = 65;
        if (d < minD) {
          const f = (minD - d) * 0.25;
          if (a.layerType !== 'L1') { a.x -= (dx/d)*f; a.y -= (dy/d)*f; }
          if (b.layerType !== 'L1') { b.x += (dx/d)*f; b.y += (dy/d)*f; }
        }
      }
    }
    // Keep in bounds
    nodes.forEach(n => {
      n.x = Math.max(pad, Math.min(W - pad, n.x));
      n.y = Math.max(pad, Math.min(H - pad, n.y));
    });
  }

  // Draw edges
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  edges.forEach(e => {
    const from = nodeMap[e.from], to = nodeMap[e.to];
    if (!from || !to) return;
    const lw = e.isHierarchy ? 0.5 : Math.min(1 + e.weight, 4);
    const alpha = e.isHierarchy ? 0.06 : 0.08 + Math.min(e.weight * 0.04, 0.15);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
    // Edge label
    if (e.label && !e.isHierarchy) {
      const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '8px system-ui'; ctx.textAlign = 'center';
      ctx.fillText(e.label, mx, my - 4);
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const r = n.layerType === 'L1' ? 18 : (n.isActive ? 14 : 10);
    // Glow
    ctx.shadowColor = n.color; ctx.shadowBlur = n.isActive ? 20 : 10;
    ctx.fillStyle = n.color;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // Active ring
    if (n.isActive) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(n.x, n.y, r + 3, 0, Math.PI * 2); ctx.stroke();
    }
    // Label
    ctx.fillStyle = n.isActive ? '#fff' : 'rgba(255,255,255,0.75)';
    ctx.font = n.isActive ? '600 11px system-ui' : '10px system-ui';
    ctx.textAlign = 'center';
    const label = n.label.length > 18 ? n.label.slice(0, 16) + '..' : n.label;
    ctx.fillText(label, n.x, n.y + r + 14);
  });

  // Legend
  const legendY = H - 16;
  let legendX = 12;
  ctx.font = '9px system-ui';
  Object.entries(layerColors).forEach(([lt, color]) => {
    const label = lt === 'L1' ? 'Global' : lt === 'L2a' ? 'Business Line' : 'Market';
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(legendX, legendY, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.textAlign = 'left';
    ctx.fillText(label, legendX + 8, legendY + 3);
    legendX += ctx.measureText(label).width + 24;
  });
}

function updateAgentStats(running) {
  const el = document.getElementById('agent-stats');
  if (!el) return;
  const parts = [];
  if (state._agentStartTime) {
    const elapsed = state._agentDuration || (Date.now() - state._agentStartTime);
    const s = Math.floor(elapsed / 1000);
    const m = Math.floor(s / 60);
    parts.push(`${m > 0 ? m + 'm ' : ''}${s % 60}s`);
  }
  if (state._agentModel) parts.push(state._agentModel.split('-').slice(0,2).join('-'));
  if (state._agentTurns) parts.push(`${state._agentTurns} turns`);
  if (state._agentCost) parts.push(`$${state._agentCost.toFixed(2)}`);
  if (parts.length) {
    el.style.display = '';
    el.innerHTML = parts.map(p => `<span>${p}</span>`).join('<span class="separator-dot">·</span>');
  }
}

function pollAgentStatus(opp_id) {
  if (state._agentPoll) clearInterval(state._agentPoll);
  state._lastOutputLen = 0;
  state._lastFeedLen = 0;
  state._agentStartTime = Date.now();
  state._agentCost = 0;
  state._agentTurns = 0;
  state._agentDuration = 0;
  state._agentModel = '';
  state._agentHasPlan = false;
  state._planContent = '';
  state._agentWasRunning = false;
  async function check() {
    try {
      const s = await api.get(`launch/${opp_id}/status`);
      const el = document.getElementById('agent-status');
      if (!el) { clearInterval(state._agentPoll); return; }
      if (s.running) {
        state._agentWasRunning = true;
        el.style.display = '';
        el.innerHTML = '<span class="live-pulse bg-brief"></span> agents running';
      } else if (state._agentHasPlan && state._lastOutputLen > 0) {
        el.style.display = '';
        el.innerHTML = '<span class="status-dot bg-brief"></span> plan ready';
        showApproveButton();
      } else if (state._lastOutputLen > 0) {
        el.style.display = '';
        el.innerHTML = '<span class="status-dot bg-accent"></span> complete';
      } else if (!s.running && state._agentWasRunning) {
        // Agent crashed — was running but stopped without producing output
        el.style.display = '';
        el.innerHTML = '<span class="status-dot bg-counter"></span> error';
        const feed = document.getElementById('agent-feed');
        if (feed) {
          const div = document.createElement('div');
          div.className = 'ai-chat-msg';
          div.innerHTML = '<span class="ai-chat-label text-counter">error</span><span class="ai-chat-text">Agent stopped unexpectedly.</span> <a href="#" class="activity-restart" onclick="resumeAfterError();return false">Resume</a>';
          feed.appendChild(div);
          feed.scrollTop = feed.scrollHeight;
        }
        clearInterval(state._agentPoll);
      } else {
        el.style.display = 'none';
      }
      // Feed agent activity
      if (s.output?.length) {
        updateAgentFeed(s.output);
        state._lastOutputLen = s.output.length;
      }
      // Update stats header
      updateAgentStats(s.running);
      // Enable/disable chat input
      const chatInput = document.getElementById('chat-input');
      const chatBtn = document.getElementById('chat-send-btn');
      if (chatInput) chatInput.disabled = !s.running;
      if (chatBtn) chatBtn.disabled = !s.running;
      updateSendButton(s.running);
      if (!s.running && state._lastOutputLen > 0) clearInterval(state._agentPoll);
    } catch (err) { console.warn('pollAgentStatus network error:', err); }
  }
  check();
  state._agentPoll = setInterval(check, 3000);
}

function updateAgentFeed(lines) {
  const feed = document.getElementById('agent-feed');
  if (!feed) return;
  let start = state._lastFeedLen || 0;
  if (lines.length < start) start = 0;
  if (lines.length <= start) return;
  const newLines = lines.slice(start);
  state._lastFeedLen = lines.length;
  const messages = parseStreamJson(newLines);
  if (!messages.length) return;
  const empty = feed.querySelector('.ai-empty');
  if (empty) empty.remove();
  for (const m of messages) {
    const div = document.createElement('div');
    div.className = 'ai-chat-msg' + (m.isTool ? ' ai-tool' : '');
    div.innerHTML = `<span class="ai-chat-label" style="color:${m.color}">${esc(m.label)}</span><span class="ai-chat-text">${esc(m.text)}</span>`;
    feed.appendChild(div);
  }
  feed.scrollTop = feed.scrollHeight;
}

function summarizeTool(name, input) {
  // Turn tool calls into short human-readable strings
  if (!input) return name;
  if (name === 'Read' && input.file_path) {
    const p = input.file_path.split('/');
    return p.slice(-2).join('/');
  }
  if (name === 'Write' && input.file_path) {
    const p = input.file_path.split('/');
    return p.slice(-2).join('/');
  }
  if (name === 'Edit' && input.file_path) {
    const p = input.file_path.split('/');
    return p.slice(-2).join('/');
  }
  if (name === 'Grep' && input.pattern) return `grep "${input.pattern}"`;
  if (name === 'Glob' && input.pattern) return input.pattern;
  if (name === 'Bash' && input.command) return input.command.length > 60 ? input.command.slice(0,60) + '...' : input.command;
  if (name === 'WebSearch' && input.query) return `"${input.query}"`;
  if (name === 'WebFetch' && input.url) return input.url.split('/').slice(-2).join('/');
  if (name === 'AskUserQuestion') {
    const qs = input?.questions;
    if (Array.isArray(qs) && qs.length > 0) return qs.map(q => q.question || '').join(' | ');
    return 'asking...';
  }
  // Fallback: show first string value
  const vals = Object.values(input);
  const first = vals.find(v => typeof v === 'string');
  return first ? (first.length > 50 ? first.slice(0,50) + '...' : first) : '';
}

function toolColor(name) {
  const n = name.toLowerCase();
  if (n === 'read') return '#3B82F6';           // blue
  if (n === 'write' || n === 'edit') return '#EF4444';  // red
  if (n === 'bash') return '#F59E0B';           // amber
  if (n === 'glob' || n === 'grep') return '#8B5CF6';   // purple
  if (n === 'agent') return '#10B981';          // green
  if (n === 'webfetch' || n === 'websearch') return '#06B6D4'; // cyan
  return '#F97316';                              // orange fallback
}

function parseStreamJson(lines, opts) {
  const msgs = [];
  const fullText = opts?.fullText || false;
  const suppressDone = opts?.suppressDone || false;
  let consecutiveParseFailures = 0;
  for (const line of lines) {
    try {
      const ev = JSON.parse(line);
      consecutiveParseFailures = 0; // reset on success
      if (ev.type === 'system' && ev.subtype === 'init') {
        state._agentModel = ev.model || '';
        state._agentStartTime = state._agentStartTime || Date.now();
        if (!state._setupInitSeen) {
          state._setupInitSeen = true;
          msgs.push({ label: 'init', color: 'var(--text-muted)', text: ev.model || 'starting', isTool: false });
        }
      } else if (ev.type === 'assistant') {
        const content = ev.message?.content || [];
        for (const block of content) {
          if (block.type === 'text' && block.text?.trim()) {
            const text = block.text.trim();
            if (fullText) {
              msgs.push({ label: 'claude', color: 'var(--color-accent)', text, isTool: false, isFullText: true });
            } else {
              const firstLine = text.split('\n')[0];
              msgs.push({ label: 'claude', color: 'var(--color-accent)', text: firstLine.length > 120 ? firstLine.slice(0,120) + '...' : firstLine, isTool: false });
            }
          }
          if (block.type === 'tool_use') {
            const name = block.name || 'tool';
            // Detect plan mode events
            if (name === 'ExitPlanMode') {
              state._agentHasPlan = true;
              msgs.push({ label: 'plan', color: '#F59E0B', text: 'Plan ready — review and approve below', isTool: false });
              continue;
            }
            // Render AskUserQuestion as readable question + options
            if (name === 'AskUserQuestion' && block.input?.questions) {
              for (const q of block.input.questions) {
                msgs.push({ label: 'question', color: '#F59E0B', text: q.question || '', isTool: false });
                if (q.options?.length) {
                  for (const opt of q.options) {
                    msgs.push({ label: '', color: 'var(--text-muted)', text: '  \u2192 ' + (opt.label || '') + (opt.description ? ': ' + opt.description : ''), isTool: false });
                  }
                }
              }
              continue;
            }
            if (name === 'Write' && block.input?.file_path?.includes('plans/')) {
              state._planContent = block.input?.content || '';
            }
            const summary = summarizeTool(name, block.input);
            msgs.push({ label: name.toLowerCase(), color: toolColor(name), text: summary, isTool: true });
          }
        }
      } else if (ev.type === 'result') {
        state._agentCost = ev.total_cost_usd || 0;
        state._agentTurns = ev.num_turns || 0;
        state._agentDuration = ev.duration_ms || 0;
        const rUsage = ev.usage || {};
        state._totalTokens += (rUsage.input_tokens || 0) +
          (rUsage.cache_creation_input_tokens || 0) +
          (rUsage.cache_read_input_tokens || 0) +
          (rUsage.output_tokens || 0);
        if (!suppressDone) {
          msgs.push({ label: 'done', color: '#10B981', text: `${ev.num_turns} turns · $${ev.total_cost_usd?.toFixed(2) || '?'}`, isTool: false });
        }
      }
    } catch (err) {
      // Non-JSON lines (warnings, plain text) are expected — skip silently
      consecutiveParseFailures++;
      if (consecutiveParseFailures > 3) {
        msgs.push({ label: 'warn', color: '#F59E0B', text: 'Some agent output could not be parsed', isTool: false });
        consecutiveParseFailures = 0; // reset to avoid spamming
      }
    }
  }
  return msgs;
}
