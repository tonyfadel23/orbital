const SLASH_COMMANDS = [
  { cmd: '/agree', desc: 'Frame the opportunity' },
  { cmd: '/assemble', desc: 'Assemble the team' },
  { cmd: '/orbit', desc: 'Run full orbit cycle' },
  { cmd: '/explore', desc: 'Parallel solution branches' },
  { cmd: '/execute', desc: 'Task breakdown + Linear tasks' },
  { cmd: '/prototype', desc: 'Prototype variation + review' },
  { cmd: '/synthesize', desc: 'Cross-agent synthesis' },
  { cmd: '/status', desc: 'Agent status check' },
];

function handleChatKey(e) {
  const hints = document.getElementById('chat-hints');
  if (hints && hintsVisible(hints)) {
    if (e.key === 'Escape') { hideHints(hints); return; }
    if (e.key === 'Tab' || (e.key === 'Enter' && hints.querySelector('.chat-hint-active'))) {
      e.preventDefault();
      const active = hints.querySelector('.chat-hint-active') || hints.querySelector('.chat-hint');
      if (active) {
        const input = document.getElementById('chat-input');
        input.value = active.dataset.value + ' ';
        hideHints(hints);
      }
      return;
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      const items = [...hints.querySelectorAll('.chat-hint')];
      const idx = items.findIndex(i => i.classList.contains('chat-hint-active'));
      items.forEach(i => i.classList.remove('chat-hint-active'));
      const next = e.key === 'ArrowDown' ? Math.min(idx + 1, items.length - 1) : Math.max(idx - 1, 0);
      items[next]?.classList.add('chat-hint-active');
      return;
    }
  }
  // Escape stops agent when hints are not visible
  if (e.key === 'Escape' && (!hints || !hintsVisible(hints))) {
    if (state._agentPoll) stopAgent();
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function handleChatInput(e) {
  const val = e.target.value;
  const hints = document.getElementById('chat-hints');
  if (!hints) return;
  // Slash commands
  if (val.startsWith('/')) {
    const q = val.toLowerCase();
    const matches = SLASH_COMMANDS.filter(c => c.cmd.startsWith(q));
    if (matches.length && val.indexOf(' ') === -1) {
      hints.innerHTML = matches.map((m, i) =>
        `<div class="chat-hint${i === 0 ? ' chat-hint-active' : ''}" data-value="${m.cmd}">
          <span class="text-accent">${m.cmd}</span>
          <span class="text-muted ml-8">${m.desc}</span>
        </div>`
      ).join('');
      showHints(hints);
      return;
    }
  }
  // @ references — show contribution/artifact files
  const atMatch = val.match(/@(\S*)$/);
  if (atMatch) {
    const q = atMatch[1].toLowerCase();
    const ws = state.workspaceData;
    const refs = [];
    const roster = ws?.opportunity?.roster;
    if (roster) refs.push(...roster.map(r => ({ name: r.function, type: 'agent' })));
    if (ws?.contributions) refs.push(...ws.contributions.map(c => ({ name: c.filename, type: 'contribution' })));
    if (ws?.artifacts) refs.push(...ws.artifacts.map(a => ({ name: a.filename, type: 'artifact' })));
    const matches = refs.filter(r => r.name.toLowerCase().includes(q)).slice(0, 6);
    if (matches.length) {
      hints.innerHTML = matches.map((m, i) =>
        `<div class="chat-hint${i === 0 ? ' chat-hint-active' : ''}" data-value="${val.slice(0, val.length - atMatch[0].length)}@${m.name}">
          <span class="text-design">@${m.name}</span>
          <span class="text-muted ml-8">${m.type}</span>
        </div>`
      ).join('');
      showHints(hints);
      return;
    }
  }
  hideHints(hints);
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';
  const hints = document.getElementById('chat-hints');
  if (hints) hideHints(hints);
  // Add user message to feed immediately
  const feed = document.getElementById('agent-feed');
  if (feed) {
    const empty = feed.querySelector('.ai-empty');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'ai-chat-msg ai-user';
    div.innerHTML = `<span class="ai-chat-label">you</span><span class="ai-chat-text">${esc(text)}</span>`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }
  // Send to backend
  const opp_id = state.currentOpp?.id;
  if (!opp_id) return;
  try {
    await api.post(`launch/${opp_id}/send`, { message: text });
  } catch (err) { console.warn('sendChatMessage error:', err); }
}

function connectLiveWebSocket(opp_id, sim, nodeMap, renderer, ws) {
  // Stash context so toggleWebSocket can reconnect
  state._wsContext = { opp_id, sim, nodeMap, renderer, ws };

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  let opened = false;
  let socket;
  try { socket = new WebSocket(`${proto}//${location.host}/ws/workspace/${opp_id}`); }
  catch { return; } // WS not supported
  state.ws = socket;

  const badge = document.getElementById('ws-status');
  if (badge) badge.innerHTML = '<span class="live-pulse"></span> connecting... <span class="ws-chevron">▾</span>';

  socket.onopen = () => {
    opened = true;
    if (badge) badge.innerHTML = '<span class="live-pulse"></span> live <span class="ws-chevron">▾</span>';
  };

  socket.onmessage = async (e) => {
    try {
      const event = JSON.parse(e.data);
      if (event.event === 'connected') return;

      // Add to live feed
      addLiveEvent(event);

      // Spawn nodes for new contributions
      if (event.type === 'contribution' && event.path) {
        const filename = event.path.replace('contributions/', '');
        const data = await api.get(`workspaces/${opp_id}/contributions/${filename}`);
        if (data) addContributionToGraph(sim, nodeMap, renderer, data, filename);
      }
      // Trigger scan ring for synthesis
      if (event.type === 'synthesis') {
        sim._scanStart = performance.now();
      }
    } catch (err) { /* ignore parse errors */ }
  };

  socket.onerror = () => {};

  let liveRetries = 0;
  socket.onclose = () => {
    const b = document.getElementById('ws-status');

    // Auto-reconnect if still on this workspace
    if (state.setupOppId === opp_id && state._wsContext && liveRetries < 5) {
      liveRetries++;
      const delay = Math.min(1000 * Math.pow(2, liveRetries - 1), 10000);
      if (b) b.innerHTML = '<span class="status-dot" style="background:var(--color-amber)"></span> reconnecting... <span class="ws-chevron">▾</span>';
      setTimeout(() => {
        if (state.setupOppId === opp_id && state._wsContext) {
          const ctx = state._wsContext;
          connectLiveWebSocket(ctx.opp_id, ctx.sim, ctx.nodeMap, ctx.renderer, ctx.ws);
        }
      }, delay);
      return;
    }

    if (!b) return;
    b.innerHTML = opened
      ? '<span class="status-dot" style="background:var(--color-counter)"></span> disconnected <span class="ws-chevron">▾</span>'
      : '<span class="status-dot" style="background:var(--text-muted)"></span> offline <span class="ws-chevron">▾</span>';
  };
}

function toggleWsDropdown() {
  const menu = document.getElementById('ws-menu');
  if (!menu) return;
  const open = !menu.classList.contains('d-none');
  if (open) { menu.classList.add('d-none'); return; }

  const connected = state.ws && state.ws.readyState === WebSocket.OPEN;
  menu.innerHTML = connected
    ? '<div class="ws-dropdown-item ws-dropdown-item--danger" onclick="wsDisconnect()"><span class="status-dot bg-counter"></span> Disconnect</div>'
    : '<div class="ws-dropdown-item" onclick="wsReconnect()"><span class="status-dot bg-accent"></span> Reconnect</div>';
  menu.classList.remove('d-none');

  // Close on outside click
  setTimeout(() => {
    const close = (e) => { if (!menu.contains(e.target) && e.target.id !== 'ws-status') { menu.classList.add('d-none'); document.removeEventListener('click', close); } };
    document.addEventListener('click', close);
  });
}

function wsDisconnect() {
  if (state.ws) { state.ws.close(); state.ws = null; }
  if (state._setupWs) { state._setupWs.close(); state._setupWs = null; }
  const menu = document.getElementById('ws-menu');
  if (menu) menu.classList.add('d-none');
}

function wsReconnect() {
  const ctx = state._wsContext;
  if (ctx) {
    const badge = document.getElementById('ws-status');
    if (badge) badge.innerHTML = '<span class="live-pulse"></span> connecting... <span class="ws-chevron">▾</span>';
    connectLiveWebSocket(ctx.opp_id, ctx.sim, ctx.nodeMap, ctx.renderer, ctx.ws);
  } else if (state.setupOppId) {
    // Reconnect orb WS (agree/assemble phase)
    connectOrbWS(state.setupOppId);
  }
  const menu = document.getElementById('ws-menu');
  if (menu) menu.classList.add('d-none');
}

function addContributionToGraph(sim, nodeMap, renderer, data, filename) {
  const fn = data.agent_function || filename.replace('.json', '').replace(/-round-\d+/, '');
  const color = agentColor(fn);
  const cx = sim.width / 2, cy = sim.height / 2;
  const AGENT_ANGLES = { product: Math.PI / 4, design: 3 * Math.PI / 4, data: 5 * Math.PI / 4, engineering: 7 * Math.PI / 4 };
  const homeAngle = AGENT_ANGLES[fn] || Math.random() * Math.PI * 2;

  // Brief node
  const briefId = `brief:${filename}`;
  if (!nodeMap[briefId]) {
    const briefNode = new GNode(briefId, 'brief', '#F59E0B', 14, { ...data, agent_function: fn, filename });
    briefNode.cluster = fn;
    nodeMap[briefId] = briefNode; sim.nodes.push(briefNode);
    const center = nodeMap['center'];
    if (center) sim.links.push(new GLink(center, briefNode, 60, '#F59E0B', 'brief'));
    briefNode.spawn(cx + Math.cos(homeAngle) * 70, cy + Math.sin(homeAngle) * 70, 0, 0);
  }

  // Finding nodes
  (data.findings || []).forEach((f, fi) => {
    const key = `${fn}:${f.id || 'f' + fi}`;
    if (nodeMap[key]) return;
    const r = f.confidence > 0.8 ? 10 : (f.confidence > 0.6 ? 8 : 6);
    const node = new GNode(key, 'finding', color, r, {
      ...f, agent: fn, agentLabel: fn, typeColor: TYPE_COLORS[f.type] || '#64748B'
    });
    node.isCounter = f.type === 'counter_signal' || f.direction === 'contradicts';
    node.cluster = fn;
    nodeMap[key] = node; sim.nodes.push(node);

    const briefNode = nodeMap[briefId];
    sim.links.push(new GLink(node, briefNode || nodeMap['center'], 100, color, 'finding'));

    // Spawn with animation
    const offset = 120 + Math.random() * 60;
    node.spawn(
      cx + Math.cos(homeAngle) * offset + (Math.random() - 0.5) * 40,
      cy + Math.sin(homeAngle) * offset + (Math.random() - 0.5) * 40,
      Math.cos(homeAngle) * 0.5, Math.sin(homeAngle) * 0.5
    );

    // Enable link
    sim.links.forEach(l => {
      if (!l.alive && l.source.alive && l.target.alive) l.alive = true;
    });
  });

  // Update stats
  const agentKeys = [...new Set(sim.nodes.filter(n => n.cluster && n.cluster !== 'assumptions').map(n => n.cluster))];
  updateGraphStats(sim, agentKeys);
  renderAgentLegend(agentKeys);
}

function addLiveEvent(event) {
  const feed = document.getElementById('live-feed');
  if (!feed) return;

  // Clear placeholder
  if (feed.children.length === 1 && !feed.querySelector('.live-event-item')) {
    feed.innerHTML = '';
  }

  const typeColors = {
    contribution: 'var(--color-product)', synthesis: 'var(--color-accent)',
    review: 'var(--color-data)', artifact: 'var(--color-design)',
    opportunity: 'var(--color-engineering)',
  };
  const color = typeColors[event.type] || 'var(--text-muted)';
  const time = event.timestamp ? new Date(event.timestamp).toLocaleTimeString() : '';

  const div = document.createElement('div');
  div.className = 'live-event-item';

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  return d + 'd ago';
}

function renderMarkdown(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '', inTable = false, inList = false, listType = '';
  for (let i = 0; i < lines.length; i++) {
    let l = lines[i];
    // Table rows
    if (l.trim().startsWith('|') && l.trim().endsWith('|')) {
      const cells = l.split('|').slice(1, -1).map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) continue; // separator row
      if (!inTable) { html += '<table>'; inTable = true; }
      const isHeader = i + 1 < lines.length && /^\|[\s-:|]+\|$/.test(lines[i+1].trim());
      const tag = isHeader ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(c)}</${tag}>`).join('') + '</tr>';
      continue;
    }
    if (inTable) { html += '</table>'; inTable = false; }
    // Close list if non-list line
    if (inList && !/^(\s*[-*]\s|^\s*\d+\.\s)/.test(l) && l.trim() !== '') {
      html += `</${listType}>`; inList = false;
    }
    // Headings
    if (/^### /.test(l)) { html += `<h3>${inlineFormat(l.slice(4))}</h3>`; continue; }
    if (/^## /.test(l)) { html += `<h2>${inlineFormat(l.slice(3))}</h2>`; continue; }
    if (/^# /.test(l)) { html += `<h1>${inlineFormat(l.slice(2))}</h1>`; continue; }
    // HR
    if (/^---+$/.test(l.trim())) { html += '<hr>'; continue; }
    // Unordered list
    if (/^\s*[-*]\s/.test(l)) {
      if (!inList || listType !== 'ul') { if (inList) html += `</${listType}>`; html += '<ul>'; inList = true; listType = 'ul'; }
      html += `<li>${inlineFormat(l.replace(/^\s*[-*]\s/, ''))}</li>`;
      continue;
    }
    // Ordered list
    if (/^\s*\d+\.\s/.test(l)) {
      if (!inList || listType !== 'ol') { if (inList) html += `</${listType}>`; html += '<ol>'; inList = true; listType = 'ol'; }
      html += `<li>${inlineFormat(l.replace(/^\s*\d+\.\s/, ''))}</li>`;
      continue;
    }
    // Blank line
    if (l.trim() === '') { continue; }
    // Paragraph
    html += `<p>${inlineFormat(l)}</p>`;
  }
  if (inTable) html += '</table>';
  if (inList) html += `</${listType}>`;
  return `<div class="md-content">${html}</div>`;
}

function inlineFormat(t) {
  return esc(t)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

function formatContent(text) {
  if (!text) return '';
  return `<div class="p-content">${esc(text).split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, ' ')}</p>`).join('')}</div>`;
}

function lines(text) { return text.split('\n').map(l => l.trim()).filter(Boolean); }

function linesToAssumptions(text) {
  return lines(text).map((content, i) => ({
    id: `asm-${String(i+1).padStart(3, '0')}`,
    content,
    status: 'untested',
    importance: i === 0 ? 'critical' : 'high',
  }));
}

function toast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

function qualityScoreClass(score) {
  if (score >= 0.7) return 'pass';
  if (score >= 0.4) return 'warn';
  return 'fail';
}

function qualityPill(passed, label) {
  const cls = passed ? 'gate-pill--pass' : 'gate-pill--fail';
  return `<span class="gate-pill ${cls}">${label || (passed ? 'PASS' : 'FAIL')}</span>`;
}

async function loadFramingQuality(opp_id) {
  const body = document.getElementById('framing-quality-body');
  if (!body) return;
  try {
    const data = await api.get(`workspaces/${opp_id}/quality/framing`);
    if (!data) { body.innerHTML = '<div class="muted-hint">No data</div>'; return; }
    const pct = Math.round(data.framing_score * 100);
    const cls = qualityScoreClass(data.framing_score);
    const readyPill = data.ready
      ? '<span class="gate-pill gate-pill--pass" style="margin-left:8px">READY TO ASSEMBLE</span>'
      : '';
    const dims = data.dimensions || {};
    const dimLabels = {
      hmw_title: 'HMW Title', type_set: 'Type', assumptions: 'Assumptions',
      success_signals: 'Success Signals', kill_signals: 'Kill Signals',
      context_refs: 'Context Refs', description_depth: 'Description',
    };
    const pillsHtml = Object.entries(dims).map(([k, v]) => {
      const label = dimLabels[k] || k;
      const dcls = v.passed ? 'gate-pill--pass' : v.score > 0 ? 'gate-pill--warn' : 'gate-pill--fail';
      return `<span class="gate-pill ${dcls}">${label}</span>`;
    }).join(' ');
    const dimRowsHtml = Object.entries(dims).map(([k, v]) => {
      const label = dimLabels[k] || k;
      const pctDim = Math.round(v.score * 100);
      const fillCls = v.passed ? 'framing-dim__fill--pass' : v.score > 0 ? 'framing-dim__fill--warn' : 'framing-dim__fill--fail';
      const scoreCls = qualityScoreClass(v.score);
      return `<div class="framing-dim">
        <span class="framing-dim__label">${esc(label)}</span>
        <div class="framing-dim__bar"><div class="framing-dim__fill ${fillCls}" style="width:${pctDim}%"></div></div>
        <span class="framing-dim__score quality-score--${scoreCls}">${pctDim}%</span>
      </div>
      <div class="framing-dim__detail">${esc(v.details)}</div>`;
    }).join('');
    body.innerHTML = `
      <div class="framing-summary" onclick="toggleFramingBreakdown()" title="Click for breakdown">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="quality-score quality-score--${cls}">${pct}%</span>${readyPill}
          <span class="text-2xs text-muted" id="framing-arrow" style="margin-left:auto">&#9660;</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${pillsHtml}</div>
      </div>
      <div class="framing-breakdown" id="framing-breakdown" style="display:none">
        ${dimRowsHtml}
      </div>`;
  } catch (err) {
    body.innerHTML = '<div class="muted-hint">Could not load</div>';
  }
}

function toggleFramingBreakdown() {
  const bd = document.getElementById('framing-breakdown');
  const arrow = document.getElementById('framing-arrow');
  if (!bd) return;
  if (bd.style.display === 'none') {
    bd.style.display = 'block';
    if (arrow) arrow.innerHTML = '&#9650;';
  } else {

}

  const strip = document.getElementById('quality-strip');

    if (!data || !data.layer_1) { strip.innerHTML = ''; return; }

async function loadQualityTab(opp_id) {
  const container = document.getElementById('quality-tab-content');
  if (!container) return;
  try {
    const data = await api.get(`workspaces/${opp_id}/quality`);
    if (!data) { container.innerHTML = '<div class="muted-hint">Quality data not available.</div>'; return; }

    let html = '';

    // Overall score

      html += `
        <div class="sidebar-section">
          <div class="flex items-center gap-10 mb-8">

      for (const gate of l1.gates) {
        const stateClass = gate.passed ? 'quality-gate--pass' : (gate.blocking ? 'quality-gate--fail' : 'quality-gate--warn');
        html += `
          <div class="quality-gate ${stateClass}">
            <span class="quality-gate__name">${esc(gate.gate_name.replace(/_/g, ' '))}</span>
            <span class="quality-gate__value">${esc(gate.detail || '')}</span>
            ${qualityPill(gate.passed)}
          </div>`;
      }
      html += '</div>';
    }

    // Layer 2 — LLM rubrics
    if (data.layer_2) {
      html += `<div class="sidebar-section">
        <div class="sidebar-section-title">Layer 2 — LLM Rubrics</div>
        <div class="quality-rubric-list">`;
      for (const [name, rubric] of Object.entries(data.layer_2.rubrics || {})) {
        const scoreClass = qualityScoreClass(rubric.score);
        html += `
          <div class="quality-rubric">
            <span class="quality-rubric__name">${esc(name.replace(/_/g, ' '))}</span>
            <span class="quality-rubric__score quality-score--${scoreClass}">${(rubric.score * 100).toFixed(0)}%</span>
          </div>`;
      }
      html += '</div></div>';
    }

    // Layer 3 — Agent Judge
    if (data.layer_3) {
      html += `<div class="sidebar-section">
        <div class="sidebar-section-title">Layer 3 — Agent Judge</div>
        <div class="quality-rubric-list">`;
      for (const [name, rubric] of Object.entries(data.layer_3.rubrics || {})) {
        const scoreClass = qualityScoreClass(rubric.score);
        html += `
          <div class="quality-rubric">
            <span class="quality-rubric__name">${esc(name.replace(/_/g, ' '))}</span>
            <span class="quality-rubric__score quality-score--${scoreClass}">${(rubric.score * 100).toFixed(0)}%</span>
          </div>`;
      }
      html += '</div></div>';
    }

    // Action buttons
    html += `<div class="sidebar-section">

        <button class="btn-secondary btn--sm" onclick="runAgentJudge('${opp_id}')">Run Agent Judge</button>
      </div>
    </div>`;

    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="muted-hint">Failed to load quality data.</div>';
  }
}

async function renderSettings(el) {
  let qg = null;
  try { qg = await api.get('quality/config'); } catch (e) {}
  if (!qg || typeof qg !== 'object') qg = {};

  // Ensure defaults
  qg.enabled = qg.enabled ?? true;
  qg.blocking_mode = qg.blocking_mode || 'warn';
  qg.layer_2 = qg.layer_2 || { enabled: true };
  qg.layer_3 = qg.layer_3 || { enabled: true };

  // Default gate definitions so all 6 always render
  const defaultGates = {
    assumption_coverage: { enabled: true, min_coverage: 1.0, blocking: true },
    confidence_floor:    { enabled: true, threshold: 0.4, blocking: true },
    solution_distinctiveness: { enabled: true, max_jaccard: 0.7, blocking: false },
    evidence_freshness:  { enabled: true, max_age_days: 180, blocking: false },
    vote_quorum:         { enabled: true, min_pct: 0.8, blocking: true },
    finding_density:     { enabled: true, min_findings: 3, blocking: true },
  };
  const l1 = { ...defaultGates, ...qg.layer_1 };
  // Merge per-gate so partial overrides don't lose defaults
  for (const [k, v] of Object.entries(defaultGates)) {
    l1[k] = { ...v, ...(l1[k] || {}) };
  }

  const gateLabels = {
    assumption_coverage: 'Assumption Coverage',
    confidence_floor: 'Confidence Floor',
    solution_distinctiveness: 'Solution Distinctiveness',
    evidence_freshness: 'Evidence Freshness',
    vote_quorum: 'Vote Quorum',
    finding_density: 'Finding Density',
  };
  const gateRows = Object.entries(l1).map(([name, gate]) => {
    const thresholdKey = Object.keys(gate).find(k => !['enabled', 'blocking'].includes(k)) || '';
    const thresholdVal = thresholdKey ? gate[thresholdKey] : '';
    const label = gateLabels[name] || name.replace(/_/g, ' ');
    const blockingBadge = gate.blocking
      ? '<span style="font-size:var(--text-xs);color:var(--accent-orange);margin-left:6px">blocking</span>'
      : '<span style="font-size:var(--text-xs);color:var(--text-muted);margin-left:6px">warn</span>';
    return `
      <div class="settings-row">
        <span class="settings-row__label">${esc(label)}${blockingBadge}</span>
        <div class="flex items-center gap-8">
          ${thresholdKey ? `<input type="text" class="settings-input" data-gate="${name}" data-key="${thresholdKey}" value="${thresholdVal}" style="width:70px;text-align:right">` : ''}
          <input type="checkbox" class="settings-toggle" data-gate="${name}" data-field="enabled" ${gate.enabled ? 'checked' : ''}>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="section">
      <h2 class="text-2xl font-semibold mb-16">Settings</h2>
      <div class="settings-grid">
        <div class="settings-card">
          <div class="settings-card__title">Quality Gates</div>
          <div class="settings-row">
            <span class="settings-row__label">Enabled</span>
            <input type="checkbox" class="settings-toggle" id="qg-enabled" ${qg.enabled ? 'checked' : ''}>
          </div>
          <div class="settings-row">
            <span class="settings-row__label">Blocking mode</span>
            <select class="form-select" id="qg-blocking-mode" style="width:120px;font-size:var(--text-xs)">
              <option value="warn" ${qg.blocking_mode === 'warn' ? 'selected' : ''}>Warn</option>
              <option value="block" ${qg.blocking_mode === 'block' ? 'selected' : ''}>Block</option>
              <option value="off" ${qg.blocking_mode === 'off' ? 'selected' : ''}>Off</option>
            </select>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-card__title">Layer 1 — Automated Gates</div>
          ${gateRows || '<div class="muted-hint">No gates configured</div>'}
        </div>

        <div class="settings-card">
          <div class="settings-card__title">Layer 2 — LLM-as-Judge</div>
          <div class="settings-row">
            <span class="settings-row__label">Enabled</span>
            <input type="checkbox" class="settings-toggle" id="l2-enabled" ${qg.layer_2?.enabled ? 'checked' : ''}>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-card__title">Layer 3 — Agent Judge</div>
          <div class="settings-row">
            <span class="settings-row__label">Enabled</span>
            <input type="checkbox" class="settings-toggle" id="l3-enabled" ${qg.layer_3?.enabled ? 'checked' : ''}>
          </div>
        </div>
      </div>

      <div class="flex justify-end mt-16">
        <button class="btn-primary" onclick="saveQualitySettings()">Save Settings</button>
      </div>
    </div>`;
}

async function saveQualitySettings() {
  const enabled = document.getElementById('qg-enabled')?.checked ?? true;
  const blocking_mode = document.getElementById('qg-blocking-mode')?.value || 'warn';
  const l2_enabled = document.getElementById('l2-enabled')?.checked ?? true;
  const l3_enabled = document.getElementById('l3-enabled')?.checked ?? true;

  // Collect Layer 1 gate settings
  const layer_1 = {};
  document.querySelectorAll('.settings-toggle[data-gate]').forEach(toggle => {
    const gate = toggle.dataset.gate;
    if (!layer_1[gate]) layer_1[gate] = {};
    layer_1[gate].enabled = toggle.checked;
  });
  document.querySelectorAll('.settings-input[data-gate]').forEach(input => {
    const gate = input.dataset.gate;
    const key = input.dataset.key;
    if (!layer_1[gate]) layer_1[gate] = {};
    const val = parseFloat(input.value);
    layer_1[gate][key] = isNaN(val) ? input.value : val;
  });

  try {
    await api.patch('quality/config', {
      enabled,
      blocking_mode,
      layer_1,
      layer_2: { enabled: l2_enabled },
      layer_3: { enabled: l3_enabled }
    });
    toast('Settings saved');
  } catch (e) {
    toast('Failed to save: ' + e.message);
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
});

// CSS animation
const styleEl = document.createElement('style');
styleEl.textContent = `@keyframes fadeSlideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }`;
document.head.appendChild(styleEl);

// ── Hash routing ────────────────────────────────────────────
function routeFromHash() {
  const hash = location.hash.replace(/^#\/?/, '');
  if (hash.startsWith('orb/')) {
    const tail = hash.replace('orb/', '');
    if (tail === 'new' || !tail) { navigate('orb', {}); return; }
    navigate('orb', { opp_id: tail }); return;
  }
  // Backwards-compat redirect
  if (hash.startsWith('investigation/')) {
    const tail = hash.replace('investigation/', '');
    if (tail === 'new' || !tail) { navigate('orb', {}); return; }
    navigate('orb', { opp_id: tail }); return;
  }
  if (hash === 'settings') { navigate('settings'); return; }
  navigate('dashboard');
}

window.addEventListener('hashchange', routeFromHash);
routeFromHash();
</script>
</body>
</html>
